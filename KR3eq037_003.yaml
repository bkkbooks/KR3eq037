body:
  text: 卷三太倉公傳此傳總分四段自太倉公至喜醫方術第一段記淳于氏之出處也自高後至多怨之者第二段記受陽慶老人之法也言黃帝扁鵲之脈書五色診病此書今不傳然為則考索其迹淳于意之術蓋陰陽醫而非疾醫故其傳中往往失醫道宜矣其所刑罪自文帝四年至除肉刑法第三段記淳于意坐法當刑少女緹縈敏達救刑也自意家居至三十九歲也第四段記治療傳書循業對問也其論亦率非疾醫之論又言有脈書上下經五色診奇咳術揆度陰陽外變藥論石神接陰陽禁書亦不傳也奇咳正義云奇為奇經八脈也奇經疾醫不取矣奇咳有説種種要亦皆陰陽之説非疾醫之事所謂不知而作説之類也以下醫案二十九條評齊侍御史成之條為則曰淳于意以謂疽也考病名其説臆而非疾醫之事故不取也扁鵲之法視毒之所在治之則病名不知不言而可也成之病如太倉公之言期而死偶中耳夫知死期病者與醫者無益徒邀名利己名利者諸道固可諱之而學之何不思之甚五臟六腑十二經絡脈法之事陰陽醫之事疾醫不取詳見於扁鵲傳可考齊王中子之條為則曰此病因之論皆臆也下氣湯方不傳惜哉言治功則其方或可用矣然以方命推知其為陰陽醫之方也夫氣者天地造化之司而非人之司也何以毒藥得下氣哉唯以毒藥去病毒則無留滯而氣自升降也何以毒藥得升降於氣其誤可知齊郎中令循之條為則曰淳于意以謂湧疝也中下熱而湧故名湧疝其治以中下熱為本與以內為本與此治難解且用火齊湯火齊湯者劉河間曰所謂黃連解毒湯也劉氏由何言之其出處不可知故亡論然言用之則必大便下利因知其方中必有大黃之輩然則淳于意所論與藥齊異矣而藥乃有功焉是淳于氏暗投冥行而功建乃不知不識暗合扁鵲之則也學者思諸齊中御府長信之條為則曰此病論陰陽醫之論而非疾醫之論也夫疾醫不拘寒熱苟欲從寒熱則不能不建藥之寒熱且視本草一味寒熱之論人人異而不一定臆也今用之從曰寒與從曰熱與擇而不能取又擇而不能捨寧亦從我好惡豈非臆而何取其臆而為治法奚治之有於是親自正之果無徵焉所謂靜言庸違也吾黨不用焉又曰淳于氏以入水中為病因是亦臆也信冬日墮水中而病與不病無它因其毒之有無也宜哉扁鵲視毒之所在為治又曰淳于氏因入水中言熱病言暑汗而以火齊湯輩治之以是雖陰陽醫不拘於因則其治可知齊王太后之條為則曰淳于意曰風疸客脬又曰病得之流汗出滫又曰風氣是療流汗出滫乎療風氣乎蓋以火齊焉如劉氏之説則論與藥違矣而有功矣是非有淳于氏之功而藥之有功也凡以脈論疾疾醫不為見扁鵲之傳足以知矣齊章武里曹山跗之條為則曰此亦陰陽醫脈論疾醫不取然言形弊者不當關灸鑱石及飲毒藥者是也形弊者蓋言精虛古語曰攻病以毒藥養病以谷內果菜古昔雖陰陽醫虛者不用毒藥針灸亦可以見齊中尉潘滿如之條為則曰此亦陰陽醫之論於疾醫無益其曰卒然合合也是脾氣也此合者乃素問所謂五臟六腑之合也而試之治療無效學者詳諸陽虛侯之相趙章之條為則曰太倉公曰病得之酒又曰是內風氣也是以酒為主為治乎以風為主為治乎此兩端不可辨凡病論之無益可以知矣唯安穀者過期是也可見古人以穀肉養之未曾以毒藥養之矣又曰皆為前分界法之句不可解濟北王之條為則曰此論亦陰陽醫之論非疾醫扁鵲等之所論也藥酒方後世不傳瀺水字書曰手足濕也齊北宮司空命婦出於名也之條為則曰固亦非疾醫之論其論病因畢竟臆見太倉公以火齊湯為治氣疝與它例不合故濟北王阿母索隱曰奶母也服虔曰乳毒也之條為則曰淳于意以謂女子豎之病熱蹶也刺法可試病者與醫者無益徒論病而無治方皆贅言也齊中大夫之條為則曰齲杇也齒後世有蟲齧之説疾醫不拘視毒之所在去其毒則齒固而不痛乃後世血蟲之論誤也不可從矣苦參湯出於千金方之方乎病因或曰風或曰臥開口或曰食而不嗽將從何治之太倉公之論模稜乎蓋臆也災川王美人之條為則曰淳于氏不言全證唯言不乳因用黃碭湯是為後世所謂催生而用之淳于氏實不知道何則藥皆毒而攻病之具也妊娠天性而似人事非人事也又似病非病也毒藥不可用也明矣大抵産前後以人事不可揣摩唯任自然則無難産之憂本草中間論墮胎之藥是食醫疾醫相混誤矣今妊娠十月中有病而用大毒藥病乃愈未曾見有一人墮胎者誠哉古語曰有故無損又無損太倉公曰脈躁躁者有餘病即飲以消石一齊夫以脈論病疾醫不取然今有堅塊則用消石消石乃有效此美人乃然言出血則因塊用之明矣雖淳于氏不知疾醫之道不拘其産後視其可用乃用消石亦非後世陰陽醫之所可企望齊丞相舍人奴之條為則曰望色主病且其論以五藏相生相剋之理而言死期反不言治法病者與醫者無益唯名利耳奚學之有災川王之條為則曰凡此病論盡非疾醫之論故不足評唯此上衝之治法以寒水拊其頭是可為後世用瀑布濫觴也齊王黃姬兄黃長卿之條為則曰此病與治法皆難信言病得之好持重縱令好持重大甚無毒之人決不病自重何關於要是不臆則妄也又言要以下者枯四分所是毒也無毒奚枯又言柔湯疾醫不言剛柔之齊濟北王侍者韓女之條為則曰此論以天事混人事誤也月事者天事也月月不違故一曰月經其月經或違者以有毒也去其毒則如天性月事來何今不知月事之故安知有治法之藥哉一曰內寒一曰欲得男子而不可得是臆也而不論其治法是謂之舌言竄藥方不傳臨災汜里女子薄吾之條為則曰淳于氏以謂蟯瘕正義曰人腹中短蟲夫腹大之因證用芫華是疾醫之法故有功矣其他病因曰戚戚然戚縮少貌又曰毛美奉發徐氏曰奉一作秦秦謂螓首言發如螓螬事蓋近也又曰中藏無邪氣及重病以藏府論疾者皆臆也疾醫不論為則又曰重病不可解也邪毒之外無病無病則色澤是必然矣齊淳于司馬之條為則曰太倉公以謂當病回風是非疾醫之論雖後如其言不取夫飽食而疾走不病回風者甚多矣無它病與不病者由毒之有無也陰陽醫不知此義以臆論病疾醫不然視毒之所在治其毒故不言病之所因齊中郎破石之條為則曰淳于氏以謂得之墮馬僵石上即是墜墮之病也以脈論之不關墮馬可知也師言曰病者安穀即過期古人貴谷誠然又曰陽處陰處可從病者之好矣死之逆順固不足論齊王侍醫遂之條為則曰五石煉丹疑是服食家之方也中熱所謂中暑也中寒所謂傷寒也扁鵲之論疑亦偽作疾醫不論石之陰陽也又曰邪氣闢矣而宛氣愈深為則云邪之外奚有宛宜哉淳于意自謂時時失之以臆欲不失豈可得乎齊王故為陽虛候時之條為則曰此治暗合扁鵲所謂視病之所在故有功矣為則又曰病得之內是論與方異矣故其所主不可知也於是太倉公之論不可為教也明矣診安陽武都里成開方之條為則曰淳于氏曰瘖即死瘖而未死也是陰陽醫之論假令剜屠腹內而遂五藏六府不可見理以推之脈以為法宜哉其違安陵阪里公乘項處之條為則曰牡疝病名非疾醫之名其餘臆而不足論問臣意所診治病之條為則曰夫度量規矩權衡繩墨皆器而雖愚夫愚婦可知若愚夫愚婦不可知私而非公公者天下之規矩而私者不可以為公也彼太倉公以陰陽脈理配天地人以別百病此時變陰陽倣佛脈理以為規矩故太倉公時時失之況乎其生徒不可學也明矣如扁鵲疾醫不然不俟切脈視毒之所在隨證處方雖生徒莫不然矣又曰周禮疾醫有焉陰陽醫無焉古人不用亦可知矣又曰病名多相類以脈別之病名何益之有問臣意曰所期病之條為則曰死生本不應期依飲食喜怒則論死生期無益唯慎戒飲食喜怒是病家養生最第一義也問臣意意方能知病死生之條為則曰太倉公云臣意家貧欲為人治病以是知太倉公失為醫之心也夫醫者不拘貧富視病人則如己病之何拘乎貧富之間問臣意知文王之條為則曰夫精不可藥治乃然蓋本草不知此藥皆毒何養精之藥之有蓄精喘頭痛目不明之證吾未見焉當慎診之勿過而可也太倉公曰氣者當調飲食云云此論後世醫家之龜鑑然夫氣者無形故非針藥所治且本草養氣藥人參之類皆誤矣問臣意師慶之條為則曰無病論故不評問臣意曰吏民之條為則曰是亦陰陽醫之論故不評問臣意診病之條為則曰於是乎淳于意與扁鵲醫道之異益可知也太史公曰為則曰太史公言若倉公者可謂近之矣過也淳于意既失醫心而用毒殺之藥得其罪奚近之有扁鵲為李氏雖所殺非其罪也淳于意雖免刑其罪也悲哉淮南子曰夫喜怒者道之邪也憂悲者德之失也好憎者心之過也嗜欲者性之纍也人大怒破陰大喜墜陽薄氣發瘖驚怖為狂憂悲多恚病乃成積好憎繁多禍乃相隨為則曰此病論非疾醫之義昔公牛哀轉病也七日化為虎公牛氏韓人轉病易病也江淮之間公牛氏有易病化為虎若中國有狂疾者疾作有時也其為虎者便還食人食人者因作真虎不食人者更復化為人其兄掩戶而入覘之則虎搏而殺之云云是故形傷於寒暑燥濕之虐者形宛而神壯神傷乎喜怒思慮之患者神盡而形有餘為則曰是非疾醫之論也如易病造化之事以人事不可論也孔子曰不語怪力亂神凍者假兼衣於春而暍者望冷風於秋夫有病於內者必有色於外矣夫梣木色青翳而螺愈蝸睆此皆治目之藥也云云形系而神泄故不免於虛為則曰梣木蝸牛治目之藥可試注虛為疾不合古訓誤也養生以經世抱德以終年可能體道矣若然者血脈無鬱滯五藏無蔚氣五月為小刑薺麥亭歷枯山氣多男澤氣多女障氣多瘖風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多夭寒氣多壽穀氣多痹丘氣多狂衍下而汙者為衍氣多仁陵氣多食輕土多利重土多遲為則曰因多而言之則可矣以理而論之則甚不可矣若理以論之則是謂之以造化混人事必所以絶聖人之道也吾黨小子慎勿言焉立夏日聚畜百藥得失之度深微窈冥難以知論不可以辭説也何以知其然今夫地黃主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而以生殊死之人亦可謂失論矣譬若羿請不死之藥於西王母嫦娥竊以奔月悵然有喪無以續之何則不知不死之藥所由生一月而膏二月而昳為則曰此論在於管子及文子大同小異各不一定皆論説之辭也論説之辭不可用於事實況於病乎故疾醫不取真人之所遊若吹詬呼吸吐故內新熊經鳥伸鳧浴猿躩鴟視虎顧是養形人也天下之物莫凶於雞毒然而良醫橐而藏之有所用也物莫所不用天雄烏喙藥之凶毒也良醫以活人為則曰後世以烏頭附子為別物誤也詳辨於藥徵故今不贅聖王以治民造父以治馬醫駱以治病同材而名自取焉嘗之而無味視之而無形不可傳於人大戟去水亭歷俞張用之不節乃反病物多類之而非鉗且得道以處崑崙扁鵲以治病老子曰知而不知尚矣不知而知病也目中有疵不害於視不可灼也喉中有病無害於息不可鑿也夫亂人者芎藭之與藁本也蛇床之與麋蕪也此皆相似者夫戶牖者風氣之所從往來而風氣者陰陽相桷者也離者必病為則曰是亦非疾醫之説以義為制者心也割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也飢而大飧非不贍也然而弗為者害於性也此四者耳目鼻口不所取去心為之制各得其所良醫者常治無病之病故無病為則曰治無病之病疾醫能治也陰陽醫雖論之臆而無徵焉人二氣則成病為則曰二氣注曰邪氣干正氣故成病邪氣者毒也無毒則一氣故不病千年之松下有茯苓上有菟絲好方非醫也治疽不擇善惡醜肉而並割之云云用智如此豈足高乎寒不能生寒熱不能生熱不寒不熱能生寒熱病者寢席醫之用針石巫之用糈藉所救鈞也貍頭愈鼠雛頭水中黃已瘻蚩散積血劉木愈齲此類之推者也為則曰凡物試而後可決其能之是非也若因蚩蟲吮血言散積血之類則臆而無徵矣本草此類甚多故辨之為醫之不能自治其病病而不就藥則勃矣與死者同病難為良醫為則曰譬喻而非疾醫之辭人食礬石而死蠶食之而不飢魚食巴菽而死鼠食之而肥類不可必推蠬象之病人之實也人之病將有誰寶之者乎病熱而強之餐救暍而飲之寒救經而引其索拯溺而授之石欲救之反為惡云云茯苓掘菟絲死蝮蛇螫人傅以和堇野葛毒藥則愈憂文疾者子治之者醫是故人皆輕小害易微事以多悔患至而後憂之是由病者已惓惓劇也而索良醫也雖有扁鵲俞跗之巧猶不能生也夫禍之來也人自生福之來也人自成之禍與福同門利與害為鄰病疽將死謂其子曰云云衆人皆知利利而病病也唯聖人知病之為利知利之為病也夫病溫而強之食病明而飲之寒此衆人之為養也而良醫之所以為病也冬日則寒涼夏日則暑傷為則曰是亦非疾醫之論也夫寒暑不病於人人因寒暑毒動而病無毒雖逢大寒大暑而不病醫者思諸夫積愛成福積怨成禍若癰疽之必潰也所浼者多矣癰疽發於指其痛遍於體故蠹啄剖梁柱蚊蚩走牛羊此之謂也人皆務於救患之備而莫能知使患無生知天之所為知人之所行則有以任於世矣知天而不知人則無以與俗交知人而不知天則無以與道遊單豹倍世離俗巖居谷飲不衣絲麻不食五穀行年七十猶有童子之顏色卒而遇飢虎殺而食之張毅好恭過宮室廊廟必趨見門閭聚衆必下廝徒馬圉皆與伉禮然不終其壽內熱而死豹養其內而虎食其外毅修其外而疾攻其內故直意適情則堅強賊之以身役物則陰陽食之此皆載務而戲乎其調者也得道之土外化而內不化外化所以入人也內不化所以全身也故內有一定之操而外能詘伸贏縮卷舒與物推移故萬舉而不陷所以貴聖人者以其能龍變也古者民茹草飲水採樹木之實食螺蠬之肉時多疾病毒傷之害於是神農乃始教民播種五穀相土地宜燥濕肥墝高下嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而遇七十毒為則曰易曰夫大人者與天地合其德與日月合其明蓋天地不可測聖人亦難識然故聖人之事措而不論論而可學其唯法乎孔子曰非先王之法言不敢道非先王之德行不敢行夫先王安道理以論此事理者無定準故人人隔異矣以其隔異之理論其不測之聖人其何有益且不知分莫大焉蓋學於古訓有獲而我善知而言之我善得而行之則言行盡徵所不知者日明一日故孔子曰由誨女知之乎知之為知之不知為不知是知也以調陰陽之氣以和四時之節以闢疾病之災神清志平百節皆寧養性之本也肥肌膚充腸腹供嗜欲養性之末也所以貴扁鵲者非貴其隨病而調藥貴其擪息脈血知病之所從生也為則曰是不知疾醫之道而言之學者思諸既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘也莫不事由也心之塞也莫知務通也不明於類也儀狄為酒禹飲而甘之遂疏儀狄而絶嗜酒所以遏流湎之行也為則曰聖人戒嗜酒之害如此故飲酒之禮不能守之非聖人之徒也且過飲者多有水病死則多吐血或吐濁水宜哉曰爛腸之食列子曰天積氣耳為則曰大抵老子莊子列子之語往往譬喻寓言而非疾醫之語蓋列子云天積氣耳是也夫君子行而言不能行則不言且人不可到天不可到而論之虛論也氣本無形無形則不可積今曰積氣非寓言而何後世見積塊妄謂積氣是不可言而言之不可言而言之則事不成故後世家曰積氣不治奚有不治之病哉是名之誤也何則氣者天之司也以人事不可治矣吾黨後世所謂積氣者為積毒而治之未曾見不治也今依有積氣之字正病名之誤矣學者思諸斫撻無傷痛指擲無痟癢為則曰是亦非疾醫之論夫醉者之墜於車也雖疾不死骨節與人同而犯害與人異其神全也云云今肪知子黨之誕我我內藏猜慮外矜觀聽追幸昔日之不焦溺也怛然內熱惕然震悸矣水火豈復可近哉自此之後範氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之為則曰是並非疾醫之論百骸六藏悸而不凝宋陽里華子中年病忘朝取而夕忘云云非藥石之所攻云云而積年之疾一朝都除秦人逄氏有子少而惠及壯而有迷罔之疾乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽云云非吾淺術所能已也吳楚之國有大木焉其名為櫞碧樹而冬生實丹而味酸食其皮汁已憤厥之疾氣疾也齊州珍之渡淮而北化為枳焉為則曰此注誤矣氣非病也疾者毒也憤厥之病聚毒於心胸以櫞皮汁治之古方胸痹用橘皮湯可以徵矣魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志強而氣弱故足於謀而寡於斷齊嬰志弱而氣強故少於慮而傷於專若換汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已為則曰此論疑亦列子之寓言其曰自外而干府藏者固藥石之所已者誠是故辨明焉夫人者以人道而不以天道是聖人之道也蓋治天下以一於衆心為歸要然人心不同而同於一是天命也以人事不可為一也故有易者任以天命委以鬼神一於衆心孔子雖聖人不關天下之政故其能無所施用雖不施用於天下之政亦不可舍因作十翼傳之夫天命自然之心以人事不可換也明矣疾醫亦然夫風寒暑濕燥火之六氣者天之正令也五藏六府者造化之所為也以人事不可測也醫之所為因人事所生之毒除其毒而已矣苟去此毒則百疾皆治焉藥石之所已者不在毒生之後則無可治者可以知耳季梁得疾七日大漸其子環而泣之請醫云云為則曰是亦非疾醫之論意者列子託名而言之身體偏枯手足胼胝一朝處以柔毛綈幕薦以梁肉蘭橘心痛體煩內熱生病矣遂適田氏之廄從馬醫作役而假郭中人戲之曰從馬醫而食不已辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉老子曰知不知上不知知病夫唯病病是以不病聖人不病以其病病是以不病莊子曰且吾嘗試問乎女民濕寢則腰疾偏死鰍然乎哉夫子曰治國去之亂國就之醫門多疾願以聽聞思其則庶幾其國有瘳乎與人有痔病者不可以適河云云上有大役則支離以有常疾不受功上與病者粟則受三種與十束薪子輿有病子祀往問之曰偉哉夫造物者將以豫為此拘拘也曲僂發背上有五管頤隱於齊肩高於項勾贅指天陰陽之氣有沴其心間而無事跰躚而鑑於井曰嗟乎夫造物者又將以豫為此拘拘也彼以生為附贅縣疣以死為決肒潰癰子輿曰子桑殆病矣裹飯而往食之云云公反誒詒為病數日不出云云當之則為病汝得全而形軀具有九竅無中道夭於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也云云君將盈嗜欲長好惡則性命之情病矣君將黜嗜欲堇好惡則耳目病矣夫神者好和而惡姦夫姦病也故勞之唯君所病之何也子適有瞀病有長者教豫曰若乘日之車而遊於襄城野今豫病少痊豫又且復遊於六合之外夫為天下亦若此而已豫又奚事焉古之真人得之也生失之也死得之也死失之也生藥也其實堇也川烏桔梗也雞癰也雞頭豕零也是時為帝者也何可勝言發不擇所出漂疽疥癰內熱溲膏是也莫為盜莫為殺人榮辱立然後睹所病貨財聚然後睹所爭今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎靜然可以補病眥𡟬可以休老子州支父曰以我為天子猶之可雖然我適有幽憂之病方且治之未暇治天下也夫天下至重也而不以害其生又況他物乎唯無以天下為者可以托天下也子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以為人教以為己仁義之慝輿馬之飾憲不忍為也為則曰韓子外傳等書大同小異今不枚舉丘所謂無病而自灸也疾走料虎頭編虎鬚幾不免虎口哉先生既來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也而焉用之感豫出異也秦王有病召醫破癰潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也子行矣為則曰老子列子莊子諸書雖間謂病率盡譬喻非疾醫之義鹽鐵論曰然猶人之病水益水而疾深知其為秦開帝業不知其為秦致亡道也云云故扁鵲不能肉白骨微箕不能存亡國也為則曰死生存亡者天命也故雖扁鵲俞跗微子箕子不能救矣蓋因病毒而死及不仁不義而亡者固非天命也治之以法及修身以道而死亡者天命也扁鵲撫息脈而知疾所由生陽氣盛則損之而調陰寒氣盛則損之調陽是以氣脈調和而邪氣無所留矣夫拙醫不知脈理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘補不足富者愈富貧者愈病矣嚴法任刑欲以禁暴止姦而姦猶不止意者非扁鵲之用針石故衆人未得其職也為則曰嘻漢儒既不知扁鵲之為疾醫又以陰陽醫之説目扁鵲宜哉後世不知疾醫也夫陰陽者天事也非人事也為何損之為何益之妄耶妄也蓋人飲食起居行正中節則無病而四支百骸無患此時乃得天地神明和光同粗之化也今如陰陽損益之説其論似可聞其事實不可見也夫醫治疾病者也病者毒也以草根木皮解其毒則疾病盡去而已矣乃扁鵲之傳評辨之故茲不贅扁鵲不能治不受針藥之疾為醫以拙矣又多求謝疾有固者不能明其法勢政小缺法令可以坊古防字而必待雅頌乃治之是猶舍鄰之醫而求俞跗而後治病所貴良醫者貴其審消息而退邪氣也其貴其下針石而鑽肌膚也云云若癰疽之相濘色淫之相連一節動而百枝搖詩曰舍彼有罪既伏其辜若此無罪淪胥以鋪痛傷無罪而纍也扁鵲攻於腠理絶邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石藏而不施法令設而不用斷已然鑿已發者凡人也治未形睹未萌者君子也為則曰聖人能知人之生質疾醫能知病毒之所在故治未形睹未萌者其唯聖人與疾醫耳素問雖論之亦以陰陽之理故無徵焉揚子法言曰或問黃帝終始曰托也昔者姒氏治水土而亟步多禹扁鵲盧人也而醫多盧夫欲售偽者必假真禹乎盧乎終始乎潛夫論曰嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癇病為則曰癇病之名疾醫不道為名之不可為治也凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為則曰是亦非疾醫之事夫脈者知毒之有無也非知病者也又曰氣之所結是漢儒以臆斷事所以疾醫之道絶焉氣本無形豈得結哉申鑑曰有養性乎曰養性秉中和守之以生已云云藥者療也所以治疾也無疾則勿藥可也肉不勝食氣況於藥乎寒斯熱熱則致滯陰藥之用也唯適其宜則不為害若已氣平也則必有傷唯針火亦如之故養性者不多服也唯在乎節之而已矣為則曰是亦非疾醫之論不知攻病與養生之道詳辨於答問書可考又曰後世所謂養生藥之誤以此論可識得也夫膏肓近心而處厄針之不達藥之不中攻之不可二豎藏焉是謂篤患故治身治國者唯是之畏或問厲志曰若殷高宗能茸其德藥瞑眩以瘳疾中論前集曰然彼亦知有馬必待乘之而後致遠有醫必待行之而後愈疾為則曰是聖門之學流也家語曰君子者行言小人者舌言是之謂乎文子曰嗜欲者生之纍也人大怒破陰大喜附陽薄氣廢音驚怖為狂憂悲焦心疾乃成積能除此五者即含於神明為則曰非疾醫之論斷不可取心卵經曰上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日功靈默朝參同契曰若藥物非種名類不同分兩參差失其綱紀藥與道乖殊丹砂水精得金乃並金水合處木火為侶四者混混列為龍虎龍陽數奇虎陰數偶肝青為父肺白為母腎黑為子離赤為女脾黃為祖云云若以野葛一寸巴豆一兩入喉輒僵不得俯仰當此之時周文揲蓍孔子占象扁鵲操針巫咸叩鼓安能令蘇復起馳走胡粉投火中色壞為鉛冰雪得溫湯解釋成太玄金以砂為主稟和於水銀變化由其真終始自相因欲作服食闕宜以同類者云云石膽雲母及礬磁硫黃燒豫章泥汞相煉治鼓下五石銅以之為輔樞雜性不同類安肯合體居千舉必萬敗欲黠反成疑僥幸訖不遇至人獨知之為則曰楊升庵曰參同契為丹經之祖云云心卵經以下皆是神仙服食之事用於常人則必有害矣醫家猶然慎勿混焉
