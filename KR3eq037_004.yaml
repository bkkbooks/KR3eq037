body:
  text: 卷四鶡冠子曰龐暖曰王獨不聞俞跗之為醫乎已成必治鬼神避之楚王臨朝為隨兵故若堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫楚王聞傳暮𡫴一蓋病也在身必待俞跗卓襄王曰善龐暖曰王其忘乎昔伊尹醫殷太公醫周武王百里醫秦申麃醫郢原季醫晉范蠡醫越管仲醫齊而五國霸其善一也然道不同數卓襄王曰願聞其數暖曰王獨不聞魏文王之問扁鵲邪曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下魏文侯曰可得聞邪扁鵲曰長兄於病視神未有形而除之故名不出於家中兄治病其在毫毛故名不出於閭若扁鵲者鑱血脈投毒藥副肌膚間而名出聞於諸侯魏文侯曰善使管子行醫術以扁鵲之道曰桓公幾能成其霸乎凡此者不病病治之無名使之無形至功之成其下謂之自然故良醫化之拙醫敗之雖幸不死創伸股維卓襄王曰善寡人雖不能無創孰能加秋毫寡人之上哉為則曰鶡冠子題辭曰漢志鶡冠子楚人居深山以鶡羽為冠著書一篇因以名之唐韓退之有曰鶡冠子十九篇其辭雜黃老刑名其博選篇四稽五至之說當矣學問篇稱賤生於無所用云云柳子厚則謂余讀賈誼鵩賦嘉其詞學者以為盡出鶡冠子皆前儒之確論卓見粗足以可觀矣劉向新序曰扁鵲見齊桓侯立有間扁鵲曰君有疾在腠理不治將恐深云云為則曰與史記其文大同小異孔叢子曰死病無良醫為則曰是亦非疾醫之論夫死者天命也雖扁鵲無奈之何醫者主疾病疾病則儘可治故雖死病若治而其死安靜矣是謂之疾無不治世所謂傷寒疫癘衆醫舉言必死其命未盡也不藥而生矣其生也拙工者八九十日而復故上工者不及三十日而復故是其徵也陸賈新語曰故制事者因其則服藥者因其良書不必起仲尼之門藥不出扁鵲之方合之者善可以為法為則曰由是觀之扁鵲之方傳於漢也明矣由是又求之傷寒論之方無古焉然其書陰陽醫之選述作而非疾醫選述作之也故唯其方可取而其論不可取特於傷寒論詳論其義焉昔扁鵲居宋得罪於宋君出亡之衛衛人有病將死者扁鵲至其家欲為治之病者之父謂扁鵲曰吾子病甚篤將為迎良醫治非子所能治也退而不用乃使靈巫求福請命對扁鵲而咒病者卒死靈巫不能治也夫扁鵲天下之良醫而不能與靈巫爭用者知與不知也春秋繁露曰今平地注水去燥就濕均薪施火去濕云云薺麥始生由陽升也其尤者葶藶死於盛夏款冬花於嚴寒云云敞曰災沴之氣其常存邪曰無也時生耳猶乎人四支五藏中也有時及其病也四支五藏皆病也為則曰是正陰陽之論疾醫不取說苑曰鋭金石雜草藥以攻疾會吉丙吉病甚將使人加紳而封之及其生也太子太傅夏侯勝曰此未死也臣聞之有陰德者必饗其樂以及其子孫今此未獲其樂而病甚非其死病也後病果愈封為博陽侯終饗其樂吳起為魏將攻中山軍人有病疽者吳子自吮其膿其母泣之旁人曰將軍於而子如是尚何為泣對曰吳子吮此子父之創而殺之於注水之戰戰不旅踵而死今又吮之安知是子何戰而死是以哭之矣為則曰此文與史記大同小異寡人有腰脾之病願諸大夫勿罪也今越腹心之疾齊猶疥癬耳秦繆公嘗出而亡駿馬自往求之見人已殺其馬方共食其肉繆公謂曰是吾駿馬也諸人皆懼而起繆公曰吾聞食駿馬肉不飲酒者殺人即以次飲之酒殺馬者皆慚而去居三年晉攻秦繆公圍之往時食馬肉者相謂曰可以出死報食馬得酒之恩矣遂潰圍繆公卒得以解難勝晉臘惠公以歸此德出而福反也常樅有疾老子往問焉曰先生疾甚矣無遺教可以語諸弟子者乎云云官怠於官成病加於少愈云云晉平公問叔向曰歲饑民疫翟人攻我我將若何對曰云云對曰吾國且亡曰何以知也應之曰吾聞病之將死也不可為良醫國之將亡也不可為計謀民有五死聖人能去其三不能除其二飢渴死者可去也凍寒死者可去也罹災兵死者可去也壽命死者不可去也癰疽死者不可去也為則曰癰疽死者不可去是不知疾醫之道夫人之論也孔子曰惡是何也語不言乎三折肱而成良醫夫陳蔡之間丘之幸也二三子從丘者皆幸人也扁鵲過趙趙王太子暴疾而死云云為則曰此記同事而其文與史記小同大異蓋皆世傳而記者所取必亦異也余因曰夫書者非有德之人則不可解也此兩者從史記乎從說苑乎苟無實見而取皆臆耳學者思諸古者有菑者謂之厲君一時素服使有司弔死問疾憂以巫醫匍匐以救之湯粥以方之善者必先乎鰥寡孤獨及病不能相養死無以葬埋則葬埋之有親喪者不呼其門有齊衰大功五月不服力役之徵有小功之喪者未葬不服力役之徵論衡曰夫百草之類皆有補益遭醫人採掇成為良藥為則曰王充不知食醫與疾醫之道此論誤矣夫食養者隨好惡故有補益之道而無攻擊之理藥用者不擇好惡故有攻擊之道而無補益之理也奚曰藥有補益古貴良醫者能知篤劇之病所從生起而以針藥治而已之如徒知病之名而坐觀之何以為奇夫人有不善則乃性命之疾也無其教治而欲令變更豈不難哉為則曰今之為醫不免王充坐觀之譏也悲哉道家相誇曰真人食氣以氣而為食云云夫服食藥物輕身益氣頗有其驗若夫延年度世無其效百藥愈病病愈而氣復氣復而身輕矣為則曰此前後諸篇率皆服食家之事也夫服食者以氣而為食非常之事於人無有益故不取矣然葛洪陶弘景孫思邈之輩妄尊信之混於醫從此而後正去而邪來論高而術卑醫道絶滅二千有餘年於此夫憂萬民之疾病之君子舍邪求正斯論止斯術盛吾黨之所願也病作而醫用禍起而巫使如自能案方和藥入室救祟則醫不售而巫不進矣子路使子羔為費宰孔子曰賊夫人之子皆以未學不見大道也醫無方術曰吾能治病問之曰何用治病曰用心意病者必不信也吏無經學曰吾能治民問之曰何用治民曰以材能是醫無方術以心意治病也百姓安肯信向而人君信用使之乎手中無錢之市使貨主問曰錢何在對曰無錢貨主必不與也夫胸中不學猶手中無錢也欲人君任使之百姓信向之奈何也為則曰後世許氏曰醫者意也是本出於子華子而其論之非已可見於此醫能治一病謂之巧能治百病謂之良是故良藥服百病之方治百人之疾大才懷百家之言故能治百族之亂扁鵲衆方孰若巧之一伎孝子之於親知病不祀神不和藥又知病之必不可治治之無益然終不肯安坐得絶猶卜筮求祟召醫和藥者惻痛殷勤冀有驗也既死氣絶不可如何夫堯之使禹治水猶病水者之使醫也然則堯之洪水天地之水病也禹之治水洪水之良醫也呂后恚恨後鴆殺趙王其後呂后出見蒼犬噬其左腋怪而卜之趙王如意為祟遂病腋傷不愈而死凡天地之間有鬼非人死精神為之也皆人思念存想之所致也致之何由由於疾病人病則憂懼憂懼見鬼出凡人不病則不畏懼故得病寢衽畏懼鬼至畏懼則存想存想則目虛見為則曰孔子曰不怪語力亂神今涉獵此前後諸篇往住此類間有病疾之事無益於人因不枚舉或問曰天地之間萬物之性含血之蟲有蝮蛇蜂蠣咸懷毒螫犯中人身云云為則曰考此論毒者皆為太陽之毒僻論也太陽為毒則太陰亦必為毒也凡天地之間變於常則咸為毒何唯太陽哉且論中曰草木之中有巴豆野葛食之湊悶頗多殺人不知此物稟何氣於天是誠然王充實不自知不知則何為此論唯言太陽之毒其誤可以知矣孝子之養親病也未死之時求卜迎醫冀禍消藥有益也既死之後雖審如巫咸良如扁鵲終不復生何則知死氣絶終無補益治死無益厚葬何差乎倍死恐傷化絶卜拒醫獨不傷義乎云云人之疾病希有不由風濕與飲食者當風臥濕握錢問祟飽飯饜食齊精解禍而病不治謂祟不得命自絶謂筮不審俗人之知也為則曰雖謂疾病非疾醫之論慎不可取焉夫聖賢之治世也有術得其術則功成失其術則事廢譬猶醫之治病也有方篤劇猶治無方儳微不愈夫方猶術病猶亂醫猶吏藥猶教也方施而藥行術設而教從教從而亂止藥行而病愈治病之醫未必惠於不為醫者然而治國之吏未必賢於不能治國者云云良醫能治未當死之人命如命窮壽盡方用無驗矣前漢書平帝記曰元始二年民疾疫者舍空邸第為置醫藥禮樂志曰桑間濮上鄭衛宋趙之聲並出內則致疾損壽外則亂政傷民郊祀志曰天子病鼎湖甚巫醫無所不致游水髮根言上郡有巫病而鬼下之上召置祠之甘泉及病使人問於神君神君言曰天子無憂病少愈強與我會甘泉於是上病愈遂起幸甘泉病良已不死之藥可得五行志曰凡貌傷者病木氣木氣病則金沴之云云為則曰已上陰陽五行相生相剋之理或神仙之事皆無益於病故疾醫不採學者思諸驕近亂替師古曰替廢惰也近疾及人則多病口喉咳故有口舌疴為則曰評同於前以下五行志言疾病並皆陰陽五行之理故疾醫不復取十八年秋有蜮劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人射人有處甚者至死南方謂之短弧為則曰劉向時嚴將取齊之淫水為避其禍因蜮而為說辭則或可也生短弧如此說則臆而不可矣藝文志曰侍醫李柱國校方技每一書已向輒條其篇目撮其指意録而奏之會向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總群書而奏其七略云云有方技略黃帝內經十八卷為則曰一說今所傳內經素問靈樞十八卷是也為則嘗細閲其書率陰陽醫之語非疾醫之語也然其中間有些一二古語在謹拔粹之而舉於篇末外經三十九卷扁鵲內經九卷為則曰據此扁鵲之書傳於漢也明矣悲哉今不傳是吾黨之憂也以陸賈新語而考之益知扁鵲之方傳於漢於是遍索其方仲景所傳傷寒論之外蓋無所見焉就其書論定扁鵲之遺法而作類聚方朝考夕試而又作方極誠哉君子之言信而有徵夫外經十二卷白氏內經三十八卷外經三十六卷旁篇二十五卷為則曰上七部不傳諸書亦未見所引用也醫經者原人血脈云云為則曰是皆非疾醫所論於是疾醫既絶於漢可以知矣五藏六府痹十二病方三十卷師古曰痹風濕之病五藏六府疝十六病方四十卷師古曰疝心腹氣病五藏六府疸十二病方四十卷師古曰疸黃病風寒熱十六病方二十六卷泰始黃帝扁鵲俞跗方二十三卷五藏傷中十一病方三十一卷客疾五藏狂顛方十七卷金創瘲瘈方三十卷婦人嬰兒方十九卷湯液經法三十二卷神農黃帝食禁七卷為則曰上十一家今亦不傳就其書目思之疑非疾醫之書悲哉疾醫之絶之尚矣經方者本草石之寒溫云云為則曰此論亦非疾醫之論諺曰有病不治常得中醫為則曰余初見此諺我業於醫以為大恥然數世之業輕忽不可舍焉於是思之思之又重思之嗟乎漢既疾醫絶滅特陰陽醫行而有此諺邪陰陽醫之於治無益可以知矣則此諺亦不為甚於是余大發憤涉獵古書始見萬病唯一毒之說因朝夕鑽研試功日新遂精窮此術乃覺得免此諺之譏也吾黨小子慎莫惑病名醫論縱令誦解天下醫書諳記病名不能治病則焉免此諺之譏夫顏子曰夫道之不修也是吾醜也夫道既已大修而不用是有國者之醜也小子勉哉勉哉不拘病名醫論其唯知去其毒耳病乎疾乎何憂靡不治方技者皆生生之具王官之一守也太古有岐伯俞跗中世有扁鵲秦和蓋論病以及國原診以知政漢興有倉公今其技暗昧故能其書以序方技為四種為則曰由是觀之班固著漢書時既言倉公之技暗昧況於扁鵲乎賈誼傳曰天下之方病大瘇一脛之大幾如腰一指之大幾如股平居不可屈伸一二指搐身慮亡聊失今不治必為錮疾後雖有扁鵲不能為已病非徒瘇也又苦𨂂盩云云又類闢且病痱夫闢者一面病痱者一方痛云云臣故曰一方病矣醫能治之而上不使為則曰是譬喻之辭非常病之論也且本文注解俱非疾醫之論朝錯傳曰為置醫巫以救疾病灌夫傳曰夫身中大創十條適萬金良藥故得無死創少瘳云云五年十月悉論灌夫支屬嬰良久乃聞有效即陽病痱不食欲死或聞上無意殺嬰復食治病議定不死云云春蚡疾一身盡痛若有擊者為則曰陽病痱是固非病蘇建傳曰引佩刀自刺衛律驚自抱持武馳召醫鑿地為坎置熅火覆武其上蹈其背以出血武氣絶半日復息惠等哭輿歸營單于壯其節朝夕遣人候問武而收系張勝武益愈為則曰本邦見古戰場記此類甚多焉後世醫家論脫血之證其誤可以知矣司馬相如傳曰芍藥之和具而後御之為則曰凡食醫與疾醫其所主異矣食醫者主養精疾醫者主攻病本草無此別故不取如師古注家亦不以之知也厚朴穹窮菖蒲江離蘪蕪為則曰皆藥名而亡足論唯文章耳相如口吃而善著書常有消渴病為則曰相如口吃與消渴遂不治而卒當時無疾醫可以知矣有之則相如奚不治而卒宜哉有有病不治之譏邪絶少陽而登太陰為則曰是固非疾醫之辭也漢儒不知古有疾醫以此論疾妄也廝徵北僑而役羡門兮屬岐伯使尚方公孫弘傳曰臣聞之氣同則從聲比則應今人主和德於上百姓和合於下云云故形和則無疾無疾則不夭君不幸罹霜露之疾云云為則曰是並非疾醫之辭今事少間君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事杜欽傳曰昭帝未寢疾徵天下名醫延年典領方藥霍光傳曰私使乳醫淳于衍行毒藥殺許後為則曰漢既絶疾醫焉故有乳醫之目趙充國傳曰竄於風寒之地離霜露疾疫瘃墮之患京翼奉傳曰臣聞人氣內逆則感動天地變見於星氣日蝕為則曰以上皆非疾醫之辭韓延壽傳曰延壽聞之對掾吏涕泣遣吏醫治視野王傳曰後遷為東海太守下濕病痹楚王囂傳曰楚成帝河平中入朝時被疾天子閔之下詔曰蓋聞天地之性人為貴人之行莫大於孝楚王囂素行孝順仁慈之國以來二十餘年纖介之過未嘗聞朕甚嘉之今乃遭命離於惡疾夫子所痛日蔑之命矣夫斯人也而有斯疾也朕甚閔焉夫行純茂而不顯異則有國者將何朂哉書不言乎用德章厥善詩曰焭焭在疚云云王喜傳曰朕居位以來寢疾未瘳反逆之謀相連不絶賊亂之臣近侍帷幄前東平王云與後謁咒詛朕使侍醫伍宏等內侍案脈幾危社稷殆莫甚焉遊俠傳曰樓護字君卿齊人父世醫也護少隨父為醫長安出入貴戚家護誦醫經本草方術數十萬言為則曰今有神農本經考之疑僞作故余以古人用藥之語集録曰藥徵鄧通傳曰文帝嘗病癰鄧通常為上嗽吮之上不樂從容問曰天下誰最愛我者乎通曰宜莫若太子太子入問疾上使太子齰癰太子嗽癰而色難之已而聞通嘗為上齰太子慚繇是心恨通許皇后外戚傳曰明年許皇后當娠病女醫淳于衍者霍氏所愛嘗入宮侍皇后疾衍夫嘗為掖庭戶衛謂衍可過辭霍夫人行為我求安治監衍如言報顯顯因生心闢左左字謂衍少夫幸報我以事我亦欲報少夫可乎衍曰夫人所言何等不可者顯曰將軍素愛小女成君欲奇貴之願以纍少夫衍曰何謂邪顯曰婦人免乳大故十死一生今皇后當免身可因投毒藥去也成君即得為皇后矣如蒙力事成富貴與少夫共之衍曰藥雜治當先嘗安可顯曰在少夫為之耳將軍領天下誰敢言者緩急相護但恐少夫無意耳衍良久曰願盡力即搗附子齎入長定宮皇后免身後衍取附子併合大醫大丸以飲皇后有頃曰我頭岑岑也藥中得無有毒對曰無有遂加煩悶崩為則曰史記有太倉公淳于意者淳于衍豈其人耶衍失醫道為毒殺人宜哉罹災夫扁鵲雖遇李𫗘之害非扁鵲之罪也太倉公雖因孝子之贖而免殺戮何免其罪哉吾黨小子勿以善小而不為惡小而為之慎哉機微之失非醫馮昭儀傳曰有一男嗣為王時未滿歲有眚病太后自養視數禱祠解哀帝即位遣中郎謁者張由將醫治中山小王由素有狂易病病發怒云云武帝時醫修氏刺治武帝得二千萬耳今愈王莽傳曰病悸寢劇死莽使太醫尚方與巧屠共刳剝之量度五藏以竹筵導其脈知所終始云可以治病為則曰疾醫息而陰陽醫繁陰陽醫繁而穿鑿彌甚彌甚而治療愈惑悲夫知毒之所在而不拘五藏四脈之動靜而知毒之多少如斯耳量度五藏經脈知所終始於治無益莽憂悶不能食亶飲酒啖腹魚敘傳曰道病中風為則曰中風之病名非疾醫之辭和鵲發精於針石後漢書光武皇帝紀曰高年鰥寡孤獨及篤癃無家屬貧不能自存者如律永念厥咎內疚於心夏京師醴泉湧出飲之者固疾皆愈惟眇蹇者不瘳為則曰漢疾醫絶焉故不知治疾之道也夫眇者有瞳子則明蹇有骨肉則起醴泉亦瞑眩而吐瀉則其毒去眇蹇皆治焉固無不治之病也孝和皇帝紀曰幼年煢煢在疚寤寐永嘆用思孔疚朕寤寐恫矜憂釁詔流民欲還歸本而無糧食者過所實稟之疾病加至醫藥其不欲還歸者勿強孝安皇帝紀曰會稽大疫遣光祿大夫將大醫循行疾病賜棺木孝桓皇帝紀曰陰陽錯序監寐寤嘆疢如疾首今京師𤺊舍死者相枕疾病致醫藥死亡厚埋藏民有不能自振及流移者稟谷如科州郡檢察務崇恩施以康我民皇后紀曰帝嘗寢病危甚陰後密言我得意不令鄧氏復有遺類後聞乃對左右流涕言曰我竭誠盡心以事皇后云云上以報帝之恩中以解宗族之禍下不令陰氏有人豕之譏即欲飲藥宮人趙王者固禁之因詐言屬有使來上疾已愈後信以為然乃止明日帝果瘳頃以廢病沉滯久不侍祠自力止原陵加咳逆唾血遂至不解存亡大分無可奈何安思閻皇后紀曰朕素有心下結氣從間以來加以浮腫逆害飲食寢以沉困比使內外勞心請禱私自忖度日夜虛劣不能復為則曰結氣口以可言事以不可為不可為而言此非虛言而何故疾醫不言結氣者嗚呼漢已不可解之語有焉是聖門之實學絶子游子夏之虛文存耳傳焉足徵學者思諸李通列傳曰宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寧平公主故特見親重然性歉恭常欲避權勢素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸弟養疾通復固辭鄧禹列傳曰訓遂撫養其中少年勇者數百人以為義從羌胡俗恥病死每臨困輒以刀自刺訓聞有困疾者輒拘持縛束不與兵刃使醫藥療之愈者非一小大莫不感悅馬援列傳曰初援在交趾常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一事時人以為南土珍怪為則曰薏苡考古人試功之能治水腫小便不利而此注引神農本經今觀其書往往陰陽服食家之論疑非神農之書故從其書試功無徵焉是知漢既有僞書吾黨多不可取又曰本邦弘法大師歸朝始傳其種故和名曰弘法麥卓茂列傳曰后王莽秉權休去官歸家及莽篡位遣使齎玄纁束帛請為國師遂嘔血託病杜門自絶伏湛列傳曰晏見中暑病卒趙喜列傳曰少有節操從兄為人所殺無子喜年十五常思報之乃挾兵結客後遂往復仇而仇家皆疾病無相距者喜以因疾報殺非仁者心且釋之而去顧謂仇曰爾曹若健遠相避也仇皆臥自搏後病愈悉自縛詣喜喜不與相見後竟殺之韋彪列傳曰未能自割且眩務滯疾不堪久待蘇竟列傳曰良醫不能救無命強梁不能與天爭故天之所壞人不得支曹裒列傳曰時有疾疫褒巡行病徒為致醫藥經理饘粥多蒙濟活第五倫列傳曰其自食牛肉而不以篤祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初頗恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安吾兄子常病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎鍾離意列傳曰建武十四年會稽大死者萬數意獨身隱親經給醫藥所步多蒙全濟宋均列傳曰軍士多溫濕疾病死者大半均嘗寢病百姓耆老為禱請旦夕問起居其為民愛若此韓稜列傳曰初為郡功曹太守葛興中風病不能聽政稜陰代興視事出入二年為則曰病名中風疾醫不名班超列傳曰超年最長今且七十衰老被病云云超素有胸脅疾楊終列傳曰且南方暑濕障毒互生愁困之民足以感動天地移變陰陽矣霍醑列傳曰譬猶療飢於附子止渴於鴆毒未入腸胃已絶咽喉豈可為哉為則曰此注云附子烏喙根同而因年狀異也後世為別物其誤明矣黃憲列傳曰父為牛醫楊彪列傳曰彪見漢祚將終遂稱腳攣不復行積十年後子修為曹操所殺操見彪問曰公何瘦之甚對曰愧無日殫先見之明猶懷老牛舐犢之愛操為之改容清河孝王傳曰慶多被病云云後上言外祖母王年老遭憂病下土無醫藥願乞詣洛陽療疾陳紀列傳曰遭父憂每哀至輒嘔血絶氣雖哀服已除而積毀消瘠殆將滅性李固列傳曰詩曰上帝闆闆下民卒疸刺周王變祖法度故使下民將盡病也劉瑜列傳曰勞散精神生長六疾為則曰此注引於左傳左傳國醫之論也以是不可論疾廷篤列傳曰皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆並貨牛黃篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慚而不得言段熲列傳曰是為癰疽伏疾留滯脅下如不誅轉就滋大皇甫嵩列傳曰符水咒說以療病病者頗愈百姓信向之董卓列傳曰潰癰雖痛勝於內食趙一列傳曰秦越人還虢太子云云為則曰虢太子記事諸書各異其世傳也明矣而書無實見不可解釋縱難解釋臆而其術難為其術難為則猶不解釋也故聖人禁之有不知而作之者我不為也吾黨小子不能為則慎勿言若欲能為之則以其實事解釋而可也劉梁列傳曰臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚石猶生我此惡而為美者也為則曰美疢左傳作疾疢為是戴就列傳曰主者窮竭酷慘無復余方乃臥就覆船下以馬通薰之趙苞列傳曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂嘔血而死為則曰趙苞至誠相貫以嘔血而死其命也夫段翳列傳曰有一生來學積年自謂略究法術辭歸鄉里翳為合膏藥並以簡書卦於筒中告生曰有急發視之生到葭萌與吏爭度津吏撾破從者頭生開筒得書言到葭萌與吏鬥頭破者以此膏裹之生用其害創者即愈生歎服乃還卒業郭玉列傳曰云云為則曰通篇可讀然非疾醫之所取今世傳醫書道家之書也故醫不得無漢諺之譏華他列傳曰云云為則曰是亦通篇可讀然他之術亦非疾醫之法也悲哉扁鵲沒後名於醫者皆道家醫而未嘗聞有疾醫之真傳然方術傳中措而不舉以其不可學也此傳中麻沸散不傳千古遺憾哉咽喉塞者用萍虀可試人形體勞動及諸導引之法亦皆可用其它莫所取矣陳文矩妻列傳曰漢中陳文矩妻者同郡李法之姊也字穆姜有二男而前妻四子文矩為安衆令喪於官四子以母非所生憎毀日積而穆姜慈愛溫仁撫育益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不別居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天愛吾兄弟不識恩養禽獸其心雖母道益隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀己之過乞就刑辟縣言之於郡郡守表異其母蠲除家徭遣散四子許以修革自後訓導愈明併為良士為則曰夫穆姜養育繼子其疾病困篤其恩情篤密世猶或可能焉至其以義方導不孝子盡其病根改過遷善遂為良士非至誠殆不可能也嗚呼可謂古今之良醫古語云樹德莫如滋去疾莫如盡穆姜有焉南蠻西南夷列傳曰南州水土溫暑加有瘴氣致死亡者十必四五冉駹夷傳曰土氣多寒在盛夏冰猶不釋云云有靈羊可療毒又有食藥鹿鹿麑有胎者其腸中糞亦療毒云云特多雜藥湟中月氏胡傳曰羌雖外患實深內疾若攻之不根是養疾疴於心腹也于置國傳曰元嘉元年長史趙評在於置病癰死評子迎喪道經拘彌拘彌王成國與于置王建素有隙乃語評子云于置王令胡醫持毒藥著創中故致死耳評子信之西夜國傳云地生白草有毒國人煎以為藥傅箭鏃所中即死禮儀志曰不豫太醫令丞將醫入就進所宜藥嘗藥監近臣中常侍小黃門皆先嘗藥云云百官志曰太醫令一人六百石本注曰掌諸醫藥丞方丞各一人本注曰藥丞主藥方丞主藥方云云內經為則曰內經之真僞詳評於醫斷故不贅今但摘其古語關係於醫事之要者録焉夫脈之小大滑澀浮沉可以指別觀浮滑澀緩急小大滑澀為則曰夫脈者考毒之動靜也耳以脈論疾者陰陽醫而疾醫不為也故扁鵲曰不待切脈言病之所在以脈不可論疾也明矣夫內經立六脈甚以易別建之宜哉雖愚夫愚婦可別規矩也不可別則非規矩也乃如難經及脈經之脈狀雖上工別之至難矣況生徒乎不思亦甚齊毒藥攻其中風者百病之長也為則曰是固非疾醫之語也而醫之為恆言而治療之害不淺鮮矣故特評之毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣為則曰不識得貫通於是則不可為醫也夫邪攻之精養之故攻者不避好惡養者隨好惡也不避好惡則雖五穀皆毒也隨好惡百藥亦皆養也文王之曷歜孔子之姜曾晳之羊棗是也而養者莫如守節攻者不如盡毒學者思諸邪之所湊其氣必虛為則曰是古語也內經布演解之大誤矣夫氣不特虛特虛則死矣今邪毒湊則氣不流通故其毒之所湊其氣必虛如不仁是也苟除其所湊之毒則氣自流通焉然以為不去其所湊之毒而補其氣氣實則愈矣奚有治也甚哉為醫之至於斯也邪氣盛則實精奪則虛為則曰是醫家以為論虛實之標的然內經布演之以陰陽也是非疾醫之論故其評詳於醫斷百病生於氣也是國醫之論而非疾醫之事鼓脹治之以雞矢醴一劑岐伯曰病名血枯云云以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁為則曰為後飯疾醫不言是陰陽醫之理耳不可取矣帝曰有病身熱解墮汗出如浴惡風少氣云云以澤瀉術各十分麋銜五分合以三指撮黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也有毒無毒所治為主適大小為制為則曰論有毒無毒是食醫之事以是論藥誤矣藥者皆毒也雖五穀用以為藥則皆毒也不可不知焉足中指支脛轉筋腳跳堅伏兔轉筋脾前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和圭以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏尉急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸上工治未病不治已病為則曰陰陽醫者以臆論之故無徵焉是謂之有論無實其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已傷寒論為則曰余於此書熟覽精讀蓋有年矣其序曰漢長沙守南陽張機著而考其文非漢之體格且後漢書有一藝名者盡舉而録奚獨仲景之無傳也歷史中至於晉書始曰後漢張仲景為醫是可言矣撰次傷寒論人者叔和也王叔和者西晉大醫令也若據叔和之言記之乎它又無所見或疑撰次之時託名乎是未審也又曰書中論與處方有乖異者以是攙入之多可知也蓋見於陸賈新語傳扁鵲之方於漢也明矣因索其方夜以繼日汲汲乎求之而未得也故標的於扁鵲之傳而撰定此書實驗於衆庶之病而採托其方為萬病唯一毒信而有徵若不為一毒而治之徒眩傷寒中風之病名則無寸效矣於是益信命男猷之正傷寒論之攙入不疑矣蓋方雖良非其人則功鮮夫扁鵲何人也古昔良醫也良醫何為也能治疾也疾不能治奚為良醫故雖有良方非其人則未嘗免馬服君之子之譏勉哉勉哉勤之在獲乎已耳傷寒論評為則曰向讀於呂氏春秋而雖有獲於病之大本為一毒然未嘗獲其治法也故孜孜汲汲夜以繼日久之始獲於傷寒論不知手舞之足蹈之是三代疾醫治萬病一毒之法也於是朝考夕試視病之所在以處其方信而有徵然此書西晉王叔和撰次為漢張仲景著而漢書無傳且見其書所篇述陰陽醫而非疾醫也唯方古也其篇中曰傷寒曰中風曰瘀血曰食傷等用柴胡是病名後世之所加而治方古人之遺法也今醫家之病名唐孫思邈曰四百四病近世之書病名加多千有餘為則不佞頑愚淺陋薄識而十之一不得記臆不記臆則不妨於為醫以病名醫不可為也於戲命哉由天寵靈獲見此方此方與呂氏春秋所言同為萬病一毒其視毒之所在以處其方何病患不治哉於是忘吾頑愚執其方而類聚之其疑者為口方圈以便復古夫空談虛論徒害事實醫唯治病病不治奚為醫者故以獲治術為務同志之士幸行言勿舌言矣
