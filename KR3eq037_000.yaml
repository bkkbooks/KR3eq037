body:
  text: 序天有日月星辰地有山川澤陵日月星辰者天之文也山川澤陵者地之象也而其文與象俯仰瞻望瞬目之間亦可能觀察焉人見其日月星辰唯謂之大見其山川澤陵唯謂之廣而其廣與大一朝一夕尺寸之陰豈可得窮極矣哉夫古書之可尊在乎其信信古醫之可貴在乎其治治而苟書之不明病之不治惡在其尊貴之也我先祖考東洞翁生二千歲之下學二千歲之上道不古則不從方不古則不取鑽研多年用以施之於今始晤萬病一毒無疾不治乃考諸古而無繆徵諸今而不疑於是規矩準繩立焉紀綱法則舉焉古疾醫之道遂復明於今世翁嘗嗟其疾醫之道熄而陰陽醫之言行稽諸秦漢以上言醫事者而評論辨闢之題曰古書醫言或恐人之視者唯謂東洞一家言不深研窮而其崇尚之者猶寡然吾東洞者原盡疾醫之本要是以其所取僅十一而所舍殆十九況乎百家亦皆非醫唯幸存古醫真言之千百於十一爾孰能分其珠玉與魚眼故苟不聰明睿智之人冀達其本要者則不可與言疾醫之大道也嗚呼吾東洞既沒先考南涯夙受其業已有傷寒論精義之著特以此書未公於世亦未上梓文化癸酉之春梨棗日謀無幾亦不幸見背不肖順辱入續業但日夕講究干父祖之事幸以父祖之靈獲業速竣尋又將就傷寒論精義庶乎得不忝矣順又竊謂此書一出人之知吾東洞與不者在乎其信於此與不且人視我之言顧者不知復以為如何文化十年冬十一月平安吉益順謹撰
