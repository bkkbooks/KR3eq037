body:
  text: 卷二荀子曰西有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也本草藥名有射干一名烏翣陶弘景曰花白莖長如射人之執竿又引阮公詩云射干臨層城是生於高處也據本草在草部中又生南陽川穀此云西方有木末詳或曰長四寸即是草云木誤也蓋生南陽亦生西方也扁讀為辨善之度以治氣養生則後彭祖以修身自名則配堯禹宜於通時利以處窮禮信是也凡用血氣走意知慮由禮則治通不由禮則勃亂提僈食飲衣服居處動靜由禮則和節不由禮則觸陷生疾容貌態度進退趨行由禮則雅不由禮則夷固辟違庸眾而野故人無禮則不生事無禮則不成國家無禮則不寧詩曰禮儀卒度笑語卒獲此之謂也人之有半何哉我欲屬之狂惑疾病也則不可聖王又誅之五疾上收而養之材而事之五疾瘖聾跛躄斷者侏儒各當其材使之謂若矇瞽修聲聾聵司火之屬官施而衣食之兼覆無遺才行反時者死無赦夫是之謂天德王者之政也罔罟毒藥不入澤不夭其生不絕其長也毒藥毒魚之藥周禮雍氏禁澤之酖者彼得之不足以藥傷補敗人主不能不有遊觀安燕之時則不得不有疾病物故之變焉如是國者事物之至也如泉源一物不應亂之端也人莫貴乎生莫樂乎安所以養生樂安者莫大乎禮義人知貴生樂安而棄禮義闢之是猶欲壽而刎頸愚莫大焉疾癢緩急之有相先者也癢與養同養備而動時則天不能病修道而不貳則天不能禍故水旱不能使之飢渴寒暑不能使之疾為則曰醫書謂六氣傷於人冒於人而建之治方其誤可以知矣無毒之人不所傷焉不所冒焉蓋荀子天論一篇熟讀玩味而疾醫之道可闡明也人苟生之為見若者必死苟利之為見若者必害為則曰生死者非人之所主故疾醫不言也且荀子以此語其有害於事實可覺知也醉者越百步之溝以為蹞步之澮也俯而出城門以為小之閨也酒亂其神也傷於濕而擊鼓鼓痹則必有弊鼓喪豚之費矣而未有俞疾之福也為則曰傷於濕疑非疾醫之語性傷為之病疾養㿋熱滑鈹輕重以形體異為則曰以形體異則無毒人不病亦可知也故向讀為享獻也謂受其獻也萬物之美而盛憂兼萬物之利而盛害如此者其求物也養生也粥壽也也皆當為耶問之辭故欲養其欲而縱其情欲養其性而危其形欲養其樂而攻其心欲養其名而亂其行如此者雖封侯稱君其與夫盜無以異乘軒戴絻與冕同夫是之謂以己為物役矣八十者一子不事九十者舉家不事廢疾非人不養者一人不事良醫之門多病人檃括之側多枉木文子曰老子曰萬物之總皆開一孔萬事之根皆出一門故聖人一度循軌不變其故不易其常放准循繩曲因其常夫喜怒者道之衰也憂悲者德之失也好憎者心之過也嗜欲者生之累也人大怒破陰大喜墜陽薄氣廢音驚怖為狂憂悲焦心疾乃成積人能除此五者即含於神明得其內者五藏寧為則曰道家之論而疾醫不取又曰老子曰人受天地變化而生一月而膏二月而血脈三月而胚四月而胎五月而筋六月而骨七月而成形八月而動九月面躁十月而生為則曰此論說之辭疾醫不取眾人皆知利而不知病聖人知病之為利利之為病故再實之木其根必傷掘藏之家其後必殃夫大利者反為害天之道也關尹子曰人之平日目忽見非常之物者皆精有所結而使之然人之病日目忽見非常之物者皆心有所歉而使之然為則曰精可謂結也氣不可謂結也何則氣者無形精者有形無形不可結也此語勝班固遠矣曰心臆者猶忘飢心忿者猶忘寒心養者猶忘病心激者猶忘痛苟吸氣以養其和孰能飢之存神以滋其暖孰能寒之養五臟以五行則無傷也孰能病之歸五臟於五行則無知之孰能痛之曰人之一呼一吸日行四十萬里化可謂速矣唯聖人不存不變為則曰並皆論說之辭曰爪之生發之長榮衛之行無頃刻止眾人皆見之於著不能見之於微聖人任化所以不化曰金玉難捐土石易舍學道之士遇徵徵當作微言妙行慎勿執之是可為而不可執若執之則腹心之疾無藥可療為則曰榮衛二字古書始見焉榮衛者蓋氣血也曰聖人太言金玉小言桔梗芣苡用之當桔梗芣苡生之不當金玉斃之亢倉子曰終生之者天地也養成之者人也云云草鬱則為腐樹鬱則為蠹人鬱則為病國鬱則百惹並起為則曰是亦道家之說非疾醫之語子華子曰醫者理也理者意也藥者瀹也瀹者養也腑臟之伏也血氣之留也空竅之塞也關鬲之礙也意其所未然也意其所將然也察於四然者而謹訓於理夫是之謂醫以其所有餘也而養其所乏也為則曰是陰陽醫之說而非疾醫之論也蓋子華子晉人程本撰有偽作之說然劉向校定其書則其所來尚矣而此論今之醫家許叔微以降據此以為大害疾醫之道故不必問真贗唯以古語辨斥其誤醫者理也理者意也是誤也夫醫者掌治疾病治疾病者方也方者聚毒藥以為方扁鵲曰視毒之所在病應見於大表蓋醫者技也何以意為其誤已見於王充論衡藥者瀹也瀹者養也是亦誤也藥皆毒有攻之意無養之意詳辨於答問書因亦不贅長短頡牾百疾俱作時方疾癘道有繈屓盲禿狂傴萬恬以生所以然者氣之所感故也為則曰夫氣者造化之司而非人事也故無益於治是以疾醫不論學者察諸劉子新論曰利害者得失之本也得失者成敗之源也云云夫內熱者飲毒藥非不害也疽痤用砭石非不痛也然而為之者以小痛來而大痛減則細害至巨害除也鄧析子曰患生於官成病始於少瘳禍生於懈慢孝衰於妻子此四者慎終如始也鬼谷子曰病者感衰氣是不神也為則曰是亦非疾醫之語戰國策曰醫扁鵲見秦武王王示之病扁鵲請除左右曰君之病在耳之前目之下除之未必已也將使耳不聰目不明君以告扁鵲鵲怒而投其石石砭石曰君與知之者謀之而與不知者敗之使此秦國之政也則君一舉而亡國矣為則曰今世亦然治療誠難知其知之人療之而不知之人妄評之是扁鵲所謂一舉亡之之謂乎以天下擊之譬猶以千鈞之弩潰癰也良醫知病人之生死為則曰知死生非疾醫之事知之不知醫者病者皆共無益學者思諸臣未嘗聞指大於臂臂大於股若有此則病必甚矣今求茈胡桔梗於沮澤則累世不得一焉及之睪黍梁父之陰則郗車而載耳客有獻不死之藥於荊王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士中射之士使人說王曰臣問謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也王殺無罪之臣而明人之欺王王乃不殺病鉤所謂臂短也身大臂短不能及地謂韓相國曰人之所以善扁鵲者為有臃腫也使善扁鵲而無臃腫也則人莫之為之也臣鄰家有遠為吏者其妻私人其夫且歸其私之者憂之其妻曰公勿憂也吾已為藥酒以待之矣韓非子曰秦之有韓若人之有心腹之病也虛處則㤥然㤥妨也心腹虛也而為妨若居濕地著而不去以極走則發矣天有大命人有大命夫香美脆味厚酒肥肉甘口而疾形曼理皓齒說情而捐精故去甚去泰身乃無害與死人同病者不可生也與亡國同事者不可存也為則曰非疾醫之事醫善吮人之傷含人之血非骨肉之親也利所加也人有禍則心畏恐心畏恐則行端直行端直則思慮熟思慮熟則得事理行端直則無禍害無禍害則盡天年得事理則必成功盡天年則全而壽必成功則富與貴全壽富之為福而福本於有禍故曰禍兮福之所倚以成其功也人處疾則貴醫有禍則畏鬼聖人在上則民少欲民少欲則血氣活而舉動理舉動理則少禍害夫內無痤疽癉痔之害而外無刑罪法誅之禍者憂則疾生疾生而智慧衰智慧衰則失度量失度量則妄舉動妄舉動則禍害至禍害至而疾嬰內疾嬰內則痛禍薄外痛禍薄外則苦痛雜於腸胃之間苦痛雜於腸胃之間則傷人也嗜欲無限動靜不節則痤疽之爪角害之良醫之治病也攻之於腠理此皆爭之於小者也為則曰非疾醫之辭腠理即表也勾踐入官於吳身執干戈為吳王洗馬故能殺夫差於姑蘇文王見詈於王門顏色不變而武王擒紂於牧野故曰守柔曰強越王之霸也不病官武王之王也不病詈故曰聖人之不病也以其不病是以無病也扁鵲診桓公云云為則曰扁鵲診桓公韓非子與史記頗有異同各傳其所聞是以不一也故解書非其人則難為信可知矣凡事不躬親為而得則謹不可言故曰君子行言小人舌言不為而言之是非聖門之學而漢儒往往有此弊也諺云巫咸雖善祝不能自祓秦醫雖善除不能身彈聞古扁鵲之治病也以刀刺骨聖人之救危國也以忠拂耳刺骨故小痛在體而長利在身拂耳故小逆在心而久福在國故甚病之人利在忍痛猛毅之君福以拂耳忍痛故扁鵲盡巧拂耳則子胥不失壽安之術也病而不忍痛則失扁鵲之巧危而不拂耳則失聖人之意如此長利不遠垂功名不久立夫良藥苦口而智者勸而飲之知其入而已疾也忠言拂於耳而明主聽之知其可以致功也為則曰史記漢書並良作毒今從之能使彈疽者必其忍痛者也夫痤疽之痛也非刺骨髓則煩心不可支也非如是不能使人以半寸砥石彈之今人主之於治亦然今有法曰斬首者令為醫匠則屋不成而病不已夫匠者手巧也而醫者齊藥也而以斬首之巧為之則不當其能夫彈痤者痛飲藥者苦為苦憊之不故彈痤飲藥則身不活病不已矣慈母之於弱子也愛不可為前不可先以愛養之也而弱子有僻行使之隨師有惡病使之事醫不隨師則陷於刑不事醫則疑於死慈母雖愛無益於振刑救死則存子者非愛也是以明主以功論之內而以利資之外是故國治而敵亂即亂亡之道臣憎則起外若眩臣愛則起內若藥民食果蓏蚌蛤腥臊惡臭而傷害腸胃民多疾病有聖人作鑽燧取火以化腥臊而民說之使王天下號之曰燧人氏夫嬰兒不剔首則腹痛首病不治則加痛也不副痤則寢益謂癰也副威而潰之披副也剔首副痤必一人抱之慈母治之然猶啼呼不止嬰兒子不知犯其所小苦致其所大利也呂氏春秋曰肥肉厚酒務以相強命之曰爛腸之食老子曰五味入口爽傷故謂之爛腸之食也為則曰嘗治嗜酒人之病諸證盡治苦煩皆止而猶未復故正氣昏盲如安睡於是無術可施無奈之何果死則吐濁水數升矣因悟敖飲過酒之人若肥滿充盈非肉而腫也爾後療酒客顯症治而後用紫圓必吐黑水濁水羸膌日甚而壯健日愈也宜哉曰爛腸之食室大則多陰臺高則多陽多陰則蹷多陽則痿此陰陽不適之患也是故先王不處大室不為高臺味不眾珍衣不燀熱燀熱則理塞腠理理塞則氣不達味眾珍則胃充胃充則中大鞔鞔讀曰懣不勝食氣為懣病也中大鞔而氣不達以此長生可得乎為則按蹷痿高誘注為疾非也蹷蹶同跳蹶也痿不能行也室大則暗處多而蹶臺高則痿弱而不能行此正所禁陰陽不適之患也聖人深慮天下莫貴於生夫耳目鼻口生之役也耳雖欲聲目雖欲色鼻雖欲芬香口雖欲滋味害於生則止在四官者不欲利於生者則弗為由此觀之耳目鼻口不得擅行必有所制譬之若官職不得擅為必有所制此貴生之術也天生人而使有貪有欲欲有情情有節聖人修節以制欲故不過行其情也百病怒起云云為則曰是非疾醫之論也夫怒者非病情也病者非情毒也故因怒而毒動則病毒不動則雖怒不病天生陰陽寒暑燥濕四時之化萬物之變莫不為利莫不為害聖人察陰陽之宜辨萬物之利以便生故精神安乎形而年壽得長焉長也者非短而續之也畢其數也為則曰順者利時逆者害時精神內守情欲外節則形性安形性安則壽命長畢數之務在乎去害何謂去害大甘大酸大苦大辛大咸五者克形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大風大濕大霖大霧七者動情則生害矣故凡養生莫若知本知本則疾無由至矣為則曰夫人生可入於形體內者飲食也而守節不過則無病壯健也失節大過則病生羸弱也而又其飲食不通利於二便則糟粕留滯於內為穢物命之曰郁毒是即病也故疾醫為萬物唯一毒而去其毒其毒以汗吐下而解去則諸病疾苦盡治焉扁鵲沒而後未曾聞有為一毒治疾者宜哉漢諺有病而不服藥當中醫之譏矣精氣之集也必有入也集於羽鳥與為飛揚集於走獸與為流行集於珠玉與為精朗集於樹木與為茂長集於聖人與為夐明集皆成也夐大也遠也精氣之來也因輕而揚之因走而行之因美而良之因長而養之因智而明之流水不腐戶樞不螻動也形氣亦然形不動則精不流精不流則氣鬱為則曰氣非可郁精不流則鬱而為毒有毒則氣不行也郁處頭則為腫為風處耳則為挶為聾處目則為䁾為盲處鼻則為鼽為窒處腹則為張為府府跳動皆腹疾處足則為痿為蹷輕水所多禿與癭人癭咽疾重水所多鼽尰足也與躄人甘水所多好與美人辛水所多疽與痤人苦水所多尫與傴人尫突胸仰向疾也傴瘠疾也凡食無強厚味無以烈味重酒是以謂之疾首疾之首也食能以時身必無災凡食之道無飢無飽是之謂五藏之葆安也口必甘味和精端容將養也之以神氣百節虞歡咸進受氣飲必小咽端直無戾今世上卜筮禱祠故疾病愈來譬之若射者射而不中反修於招一作的何益於中夫以湯止沸沸愈不止去其火則止矣故巫醫毒藥逐除治之故古之人賤之也為其末也為則曰夫疾者因情欲妄動飲食過度而毒生焉聖人憂之作禮以遠其害也建男女之別戒以色欲建飲酒之禮避以沉酗建食餌之禮節以飲食從之則毒不生病不至盡天數矣蓋既毒生則病至病至則以毒藥治之其原率莫不由飲食情欲故古之人賤之也治病為其末也吾於是益知萬病唯一毒退見扁鵲傳扁鵲亦然於是治萬病無違戾矣問曰常無病而有好食河豚魚者常有病而好食河豚魚者而終俱不毒或時俱食而多病之人者不毒無病之人者毒而死如何答曰生死者我不知於是藥之瞑眩可知也毒動則瞑眩疾乃瘳弗動則弗瞑眩弗瞑眩則疾乃弗瘳今食河豚魚瞑眩吐瀉而死或吐血而死死同矣故謂死生不可知也蓋死病有其證用大毒藥死病者不瞑眩瞑眩則疾乃瘳以是大病用大毒何為束手俟斃也哉四月聚蓄百藥糜草死是救病而飲之以堇也文王寢疾五日而地動東南西北不出國郊百吏皆請曰臣聞地之動為人主也今王寢疾五日而地動四面不出周郊群臣皆恐曰請移之文王曰不可夫天之見妖也以罰有罪也我必有罪故天以此罰我也今故興事動眾以增國城是重吾罪也不可文王曰昌也請改行重善以移之其可以免乎於是謹其禮秩皮革以交諸侯飾其辭令幣帛以禮豪士頒其爵列等級田疇以償群臣無幾何疾乃止文王即位八年而地動已動之後四十三年凡文王立國五十一年而終此文王之所以止殃翦妖也若用藥者然得良藥則活人中於病毒為良得惡藥則殺人不中於病毒為惡義兵之為天下良藥也亦大矣陽城胥渠處廣門之官夜款門而謁曰主君之臣胥渠有疾醫教之曰得白騾之肝病則止不得則死謁者入通董安於御於側慍曰譆胥渠也期吾君騾請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取肝以與陽城胥渠處無幾何趙興兵而攻翟廣門之官在七百人右七百人皆先登而獲甲者人主其胡可以不好士人或曰菟絲無根菟絲非無根也其根不屬也茯苓是慈石召鐵或引之也為則曰是之謂論說之辭仁人之得飴以養疾侍老也蹠與企足企足莊蹻也大盜人得飴以開閉取楗也發蓋藏起大眾地氣沮泄是謂發天地之房諸蟄則死民多疾疫又隨以喪命之曰暢月齊王疾痏使人之宋迎文摯文摯至視王之疾謂太子曰王之疾必可已也雖然王疾已則必殺摯也太子曰何故文摯對曰非怒王疾不可治怒王則摯必死太子頓首強請曰苟已王之疾臣與臣之母以死爭之於王王必倖臣與臣之母願先生之勿患也文摯曰諾請以死為王與太子期而將往不當者三齊王固已怒矣文摯至不解屨登床履王衣問王之病王怒而不與言文摯因出辭以重怒王王叱而起疾乃遂已王大怒不說將生烹文摯太子與王后急爭之而不能得果以鼎生烹文摯爨之三日三夜顏色不變文摯曰誠欲殺我則胡不覆之以絕陰陽之氣王使覆之文摯乃死夫忠於治世易忠於濁世難文摯非不知活王之疾而身獲死也為太子行難以成其義也為則曰是亦非疾醫之事樂正子春下堂而傷足瘳而數月不出猶有憂色門人問之曰夫子下堂而傷足瘳而數月不出猶有憂色敢問其故樂正子春曰善乎而問之吾聞之曾子曾子聞之仲尼父母全而生之子全而歸之不虧其身不損其形可謂孝矣君子無行咫步而忘之余忘孝道是以憂故曰身者非其私有也嚴親之遺躬也民之本教曰孝其行孝曰養養可能也敬為難敬可能也安為難安可能也卒為難父母既沒敬行其身無遺父母惡名可謂能終矣譬之若良醫病萬變藥亦萬變病變而藥不變向之壽民今為殤子矣為則曰此語無實見而用則為迷亂之端也實見何也自為而實得之即是也如陰陽之醫不然以陰陽五行為定則矣彼陰陽五行者天事也不可為人事之法則矣病者人事也以天事不可測度也然而陰陽之醫以此為法則故病證同而師弟所見必異也如疾醫以毒之所在處方證若變則方隨變乃扁鵲所謂病應見於大表是也故病證同則師弟所見必同倘異非法也夫病者毒也治之方無它去其毒而已矣欲識以此方去此毒自為而後可知也躬不親為而徒以師傳欲為之譬如長劍未嘗學人而期斷於鏌鋣豈可得乎知毒之所在處方而不知應見於大表但處方欲治病譬如刻於舟求劍亦何可得乎蓋視毒之所在隋發其毒之證而處方仍毒之所在如故而證異於毒之所在則因其異而異其方是故苟無實見書不可解也人孰謂之妄言曰常之巫審於死生能去苛病猶尚可疑耶管仲對曰死生命也苛病失也君不任其命守其本而恃常之巫彼將以此無不為也為則曰失養生修身之節則毒生是即病也奚用巫哉無益於病反為妖惑宜哉管仲之言乎巫彭作醫凡人三百六十節九竅五臟六腑肌膚欲其比也血脈欲其通也筋骨欲其固也心志欲其和也精氣欲其行也若此則病無所居而惡無因生矣病之留惡之生也精氣鬱也故水鬱則為汙樹鬱則為蠧草鬱則為蕢國亦有郁主德不通足欲不達此國之郁也國郁處久則百惡並起而萬災叢至矣今有良醫於此治十人而起九人所以求之萬也故賢者之致功名也比乎良醫而君人者不知疾求豈不過乎越之於吳也譬若心腹之疾也雖無作其傷深而在內也夫齊之於吳也疥癬之病也不苦其已也且其無傷也知不知上矣過者之患不知而自以為知物多類然而不然故亡國僇民無已夫草有莘有藟獨食之則殺人合而食之則益壽萬堇不殺漆淖水合兩淖則蹇涇之則為乾金柔錫柔合兩柔則為剛燔之則為焯或涇而干成燔而淖類固不必可推知也小方太方之類也小馬大馬之類也小智非大智之類也魯人有公孫悼者告人曰我能起死人人問其故對曰我固能治偏枯今吾倍所以為偏枯之藥則可以起死人矣物固有可以為小不可以為大可以為半不可以為全者也為則曰余嘗繼父祖之業既欲行之無規矩準繩以臆傳之固不可為於是乎廣尋醫之可以為規矩準繩者矣而漢以降疾醫之道熄而不炳陰陽之醫隆而不息夫陰陽醫者以五行為規矩準繩滔滔者天下皆是也蓋陰陽五行者造化之事而非人事也何為以是為人之疾病之法則哉嗚呼甚矣我之愚世咸為之我獨不能唯忙忙然如望大洋無奈之何已而奮發曰書不言乎學於古訓有獲於是乎涉獵漢以上之書至呂氏春秋盡數郁達二篇拍節仰天而嘆曰嗟聖人之言信而有徵是治病之大本良又萬病唯一毒之樞機也既已獲治病之大本為一毒則盍獲治之規則嗟是天乎聖人乎抑亦求之之誠乎夫誠者天之道也誠之者人之道也故誠之外無天誠之外無聖人誠學之之外無君子夫誠者不思而得不勉而中故求而不止則自然得乎其身是誠也誠者天之道也敬天守天職者人之道也勉不息則有獲有獲謂之有誠於身誠者無賢愚一也何憂我愚哉唯誠學古訓在乎獲之而已矣又曰或問曰郁從何起答曰萬事節則國家治身體修百殃不起故飲食起居萬端慎節惟養生最節第一也史記三皇本紀曰以赭鞭鞭草木始嘗百草始有醫藥為則曰以赭鞭鞭草木聖人之事無論然不可以為訓夫教者教常人之事也常人不能為訓非教也因疑此世傳焉且夫方也者天下萬民之方而非一人之所能制也何則用而有徵然後為方苟不試而為方是臆耳豈足為方哉為則謹謂蓋神農氏憂萬民之疾病之聖人也故聚其方以備焉孔子曰周鑑於二代鬱郁乎文哉吾從周方之雖聖人不成於一人之手可以知矣今傳於世神農本經疑偽作也始皇本紀曰使韓終侯公石生求仙人不死之藥所不去者醫藥卜筮種樹之書為則曰始皇求仙藥雖百方終毫無有效不足道耳高祖本紀曰漢王傷胸乃捫足曰虜中吾指漢王病創臥張良強請漢王起行勞軍以安士卒毋令楚乘勝於漢漢王出行軍病甚因馳入成皋高祖擊布時為流矢所中行道病病甚呂后迎良醫醫入見高祖問醫醫曰病可治於是高祖嫚罵之曰吾以布衣持三尺劍取天下此非天命乎命乃在天雖扁鵲何益遂不使治病孝武本紀曰天子病鼎湖甚巫醫無所不致至不愈游水髮根乃言曰上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君神君言曰天子毋憂病病少愈強與我會甘泉於是病愈遂幸甘泉病良已大赦天下置壽宮神君天地之道寒暑不時則疾古者天地順而四時當民有德而五穀昌疾疚不作而無祅祥此之謂大當趙世家曰趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安於問扁鵲曰血脈治也而何怪云云為則曰扁鵲之言可學焉其它無論語曰不語怪力亂神留侯世家曰毒藥苦口利於病為則曰毒藥家語又作良藥疑後人之儳入史漢皆作毒藥可從商君列傳曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也蘇秦列傳曰臣聞飢人所以飢而不食烏喙者為其愈充腹而與餓死同患也扁鵲傳評莊周有言曰道為天下裂豈唯聖人之道而已疾醫摧而陰陽醫作陰陽醫破而神仙醫興自扁鵲沒數千載於茲道之云廢茅塞極矣悲夫疾醫則扁鵲陰陽醫則淳于意神仙醫則葛洪孫思邈皆其選也而淳于葛孫二家之為方也無益於治療有害於古訓獨有扁鵲氏耳今之人非質辨三家者之異同而明解之披荊棘而脫陷澤之厄欲以身置彼周行豈可得乎哉周行也者大道也謂疾醫之道也扁鵲傳中言之與事不可屬諸疾醫而屬諸疾醫者有之可附諸陰陽醫而不附諸陰陽醫者有之是班固所謂疏略牴牾者邪太史公素不知扁鵲之為與淳于意相反粗謂無大逕庭方其撰傳唯採舊記書序列之耳未遑是正至若乳長桑君之藥卜趙簡子之夢即太史公豈不知之瞽說也顧欲傳其信故可信者存焉疑者亦存焉是其所以馳騁古今上下數千載之間而該博浩大也乃班之呫譁反唇又庸傷乎雖然信信剖析真偽而後傳可讀道可明也學者思諸自扁鵲者至為名耳為第一段長桑君事妄誕固不足信矣若曰飲彼懷中藥因得以聖於醫則今之人非遇神人不可得而為扁鵲耶孔子曰道不遠人人之為道而遠人不可以為道又曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖取人亦有所不能焉即扁鵲聖於醫亦學而至焉耳何用戀戀願念神人為自為醫至四萬畝為第二段趙簡子事亦黠譎孟子所謂齊東野人之語自其後至使起耳為第三段中庶子之言即陰陽醫之言宜哉扁鵲不取也切脈望色聽聲寫形是素問所重望問聞切之四術也乃扁鵲則曰不俟四者言病之所在可見素問之說不與扁鵲相吻合並與聞病之陽論得其陰聞病之陰論得其陽及病應見於大表皆疾醫之古訓而扁鵲之所以聖於醫也其說疾醫之道至矣盡矣莫以尚焉乃今之人不古訓是依而欲直為扁鵲多見其不知量也何謂病之所為陰陽及見於大表人告我以顯於外者我乃診得伏於內者人告我以伏於內者我乃診得顯於外者陰陽兩得之隨證理劑則其於已病猶承蜩也但論得語疑非疾醫辭氣診論相似無乃有文字訛謬乎屍蹷說亦陰陽醫之言並與治方皆不足信矣至曰越人非能生死人也此自當生者越人能使之起耳何其言之願款也乃葛孫之徒真人自待猥以長生可致何其言之詐諼也自扁鵲至侯遂死為第四段亦實齊東野人之語自聖人至難治也為第五段蓋記者因事立論以諷喻垂戒也秦漢文每多此例人之所病病疾多而醫之所病病道少是必古語何則病狀之為變也其麗弗億莫有底止苟非知所以為毒也一則其於已病猶拾瀋也古之人或觀於醫乏承蜩之術人抱拾瀋之憂因發此嘆也病有六不治第四之不治說亦必陰陽醫之言也自扁鵲至扁鵲也亦為一小段按周官醫科有四食醫也疾醫也瘍醫也獸醫也夫療帶下療小兒療耳目痹是皆關疾醫手者豈可區別而後世立科名家沾沾自矜至相謂曰某疾吾長於療之某疾彼長於療之各得扁鵲一體夫隨俗為變自稱其科淳于意猶所不屑也而況扁鵲乎道聽途說實攘公羭卑卑陋識職此之由不可不熟凡五段中間疏略讀扁鵲之傳正義曰秦越人與軒轅時扁鵲相類乃號之曰扁鵲又家於盧因命之曰盧醫也自扁鵲者至以診脈為名耳一段記性名出處世傳也是長君之事不足信矣以言飲神人之禁方而眼目瞭然果然則不遇於神人則不成遇神人則不學而可至豈可尊信扁鵲哉夫大道者無賢愚學而可行唯賢者特諭於大愚者亦諭於小故謂大道也扁鵲可學若不可學則非所以稱古今名醫也自為醫至田四萬畝二段亦世傳也自其後扁鵲至越人能使之起耳三段中庶子所謂皆盡陰陽醫之論也故扁鵲不取自扁鵲仰天嘆曰至尚溫也又一段是越人之真言末代醫家之龜鑑也學之在茲思之在茲得之在茲教之在茲微此傳疾醫之道永捐拂地是太史公之賜也偉哉太史公之有功於醫夫切脈望色聽聲寫形者素問所謂望問聞切之四知而不得之則不可為醫也而扁鵲不俟之言病之所在則素難與扁鵲醫道之異可以見已所謂病之所在者病毒也聞病之陽陽者顯也聞病之陰陰者隱也聞病之顯證搜索而知其陰毒也譬如聞下利讝語搜索而知有燥屎聞病之隱證搜索而知其陽毒也譬如聞煩悸之隱證而知動之所在此語漢以降誤解其故何也疾醫道廢而陰陽醫舉焉扁鵲者疾醫也以疾醫之語陰陽之醫解之故多牽強且無益於實事也病應見於大表是古今治法之規則也非見於大表則何以傳人如陰陽醫則不見於大表理以推其因理者無有定軌故見一病人而師弟相反目無規矩準繩也扁鵲不然以見於大表定治方故師弟無異有規矩準繩也自扁鵲曰若太子虢太子說苑十八作趙太子文亦少異可並考至二旬而復故也又一段世傳疑非疾醫之語且其方不傳自故天下至能使之起耳是又扁鵲之真言也以是為古今之名醫可以見矣自扁鵲過齊至桓侯遂死裴駰云謂是齊侯田和之子桓公午也韓非子齊作蔡四段世傳疑非疾醫之事也自使聖人預知微至言脈者由扁鵲也五段是疑太史公之言因桓公之言太史公教戒於人也人之所病病疾多而醫之所病病道少是太史公不知疾醫故有此嘆邪嗚呼疾醫之湮滅亦已尚矣夫疾醫者視萬物唯為一毒故雖病千狀萬怪其治之見毒之所在而去其毒則皆治未嘗見不治者也六不治之內陰陽並藏氣不定四不治也是司馬遷所以不知疾醫也以扁鵲為帶下醫為耳目醫為痹醫為小兒醫分科之誤不足深尤也扁鵲傳總論古今評史記漢書者曰傳之法以為漢書優史記故史記廢而不行尚矣以余觀之史記何劣漢書乎虛實並存不妄用舍唯世傳謹記是傳之法也班固者察虛實加用舍又從是非之此非傳法也蓋太史公謂醫者主於脈故始終以脈為文雖然有一齟齬者人之所諱太史公豈不之知哉知而書之傳法也偉哉若微此傳吾儕小人千載之後得知扁鵲乎可貴可仰其所以時有齟齬者非醫也古者醫有四而太史公不之知故扁鵲與倉公為一傳且以淳于氏之言為醫之正路書於扁鵲之傳以脈為始終貫接其中間插入越人之為方也不待切脈言病之所在之事是非夫所謂文之齟齬乎然不用取捨唯事實謹記傳之法也假使太史公妄用取捨則必去此語則後世由何知扁鵲乎偉哉太史公行文之法奇而正慎之至也固非諸子所企及也
