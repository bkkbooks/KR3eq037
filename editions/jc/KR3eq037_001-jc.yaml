body:
  text: 卷一易曰九五旡妄之疾勿藥有喜象曰旡妄藥不可試也為則曰九五以中正當尊位下又以中正應之可謂旡妄之至其道無以加矣疾者謂作之病也以九五之無妄如其有疾勿以藥治則有喜也夫人之有疾則以毒藥攻去其病毒以復其正若無疾病而攻治之則反害其正矣故勿藥自愈也旡妄之疾雖自外表旡妄之體剛健貞順固不受也而旡妄之疾而動則是為妄也書曰若藥勿瞑眩厥疾勿瘳為則曰書言醫事可信莫古焉而後世不由此語蓋漢以降疾醫之道熄焉陰陽醫隆焉夫陰陽者造化之事而非人事也故聖門天地陰陽者恭敬而從之慎無犯耳以陰陽不論人事也然漢以降陰陽之說播而吾道湮矣其論益似微其事益難成也悲哉天下眾庶嬰系疾病不能免脫其苦患也是無它以陰陽論疾病以不知為知之弊也乃如太倉公是也蓋醫者掌疾病疾病不治豈謂醫乎然太倉公論死生而不能救疾病偶有救者論與治乖非空言虛論而何故於其傳評之可以考矣今此語易讀難行為之則瞑眩瞑眩人人皆異千變萬怪不可名狀也故藥中肯綮毒不解則藥終勿瞑眩也毒解則藥忽瞑眩也或有眩暝數十日絕食羸瘦將死而毒盡頓快者也或有瞑眩數死數蘇而毒盡漸治者也是皆軀不自為之者奚能得知焉故曰此語易讀難行也醫衛習熟在茲醫術習熟在茲詩經曰匪我言耄爾用憂謔多將熇熇不可救藥為則曰多行熇熇慘毒之惡譬之死病無良醫禮記曰醫不三世不服其藥孔氏穎達曰父子相承至三世是慎物調齊矣呂氏大臨曰醫至三世治人多矣用物熟矣功已試而無疑然後服之亦謹疾之道也方氏愨曰醫之為術苟非祖父子孫傳業則術無自而精術之不精可服其藥乎為則曰禮之所言其常而已雖非傳業其人而自然克得倘克治疾未及三世固所可用也凡執技以事上者祝史射御醫卜及百工凡執技以事上者不貳事不移官為則曰禮運曰臣與家僕雜居齊齒非禮也孟春行秋令則其民大疫季春行夏令則民多疾疫孟夏月也聚蓄百藥仲夏行秋令民殃於疫孟秋行夏令民多瘧疾季秋行夏令民多鼽嚏民必疾疫又隨以喪命之曰暢月仲冬行春令民多疥癘為則曰凡月令之言病於治療無益矣雖聖經不能無疑唯率以言之乃可也理以推之乃不可也又周禮及呂氏春秋等月令皆效之非疾醫之事惻怛之心痛疾之意悲哀志懣氣盛為則曰是不因毒病故不藥而治以此醫之治毒可確知矣或曰輔病婦人童子不技不能病也為則曰可考喪服四制義疏周禮曰聚毒藥以共醫事為則曰注云藥之物恆多毒是不知而為說誤也夫藥皆毒也以毒解毒故瞑眩弗瞑眩厥疾弗瘳雖五穀用以為藥則毒故瞑眩也鄭玄不為醫因不知此義而作說其誤傳於千載聖人之禁戒可畏可慎歲終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下為則曰稽醫事之當否而非計死生之多少誤有為計死生之多少者豈得以死生稽人功哉夫死生者天之主也疾病者醫之主也假令瘳於疾病雖十全矣命盡則死故古語曰死病無良醫是之謂也食醫掌和王之六食六飲六膳百羞百醬八珍之齊凡食齊眡春時羹齊眡夏時醬齊眡秋時飲齊眡冬時凡和春多酸夏多苦秋多辛冬多咸調以滑甘凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜蓏凡君子之食恆放焉為則曰以食醫之法不可論疾醫也食者有養之意也疾者有攻之意也不可混矣蓋本草混之故建禁忌之法誤也大都養者從好惡攻者不拘好惡也疾醫掌養萬民之疾病四時皆有癘疾春時有痟酸削也首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾為則曰是因四時氣令而內毒動也氣令者天事也以人事不可治也內毒者人事也疾醫能治之故見病發言之乃可也理以推之乃不可也以五味五穀五藥養其病為則曰病無養之道故注云養猶治也又曰病由氣勝負而生是陰陽醫之說而非疾醫之論以五氣五聲五色眡其死生為則曰知死生也病者與醫者無益由是思之古人有疑於周禮也宜哉兩之以九竅之變參之以九藏之動為則曰九竅九藏四肢百體是造化之所為也以人事不可揆也病者皆毒依於法去其毒則九竅九藏之變皆治復初由是觀之古人所謂是亦攙入乎凡民之有疾病者分而治之死終則各書其所以而入於醫師瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劑殺之齊鄭司農曰祝當為注讀如注病之注聲之誤也注謂附著劀謂刮去凡療瘍以五毒攻之鄭司農曰止病曰療攻治也五毒五藥之有毒者今醫方五毒之藥作之合黃堥置石膽丹砂雄黃礬石慈石其中燒之三日三夜其煙上著以雞羽掃取以注創惡肉破骨則盡出以五氣養之以五藥療之以五味節之鄭司農曰五氣當作五穀為則曰五穀亦用於藥則皆毒也凡藥以酸養骨以辛養筋以咸養脈以苦養氣以甘養肉以滑養竅為則曰是亦攙入陰陽之論也疾醫不取辨三酒之物一曰事酒二曰昔酒三曰清酒鄭司農曰事酒有事而飲也昔酒無事而飲也清酒祭祀之酒玄謂事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬釀接夏而成為則曰古方白酒清酒以是可知矣論語曰孟式伯問孝子曰父母唯其疾之憂古注曰孝子不妄為非唯疾病然後使父母憂伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也子之所慎齊戰疾為則曰疾之慎則在乎守節曾子有疾召門弟子曰啟予手啟予足詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善為則曰孝經云身體髮膚受之父母不敢毀傷孝之始也免者免災也夫君子言必信行必忠故免災今之學者乃不然慎旃敢問死曰未知生焉知死為則曰死生天命也故聖人不論況於常人乎子夏曰商聞之矣死生有命富貴在天子曰南人有言曰人而無恆不可以作巫醫善夫物子曰人而無恆不可以作巫醫鄭玄曰主巫醫不能治無恆之人物子曰鄭玄之解古來相傳之說已作巫醫者謂為其人卜筮且醫疾也非謂以其人為巫醫之人也康子饋藥拜而受之曰丘未達不敢嘗為則曰孔安國曰未知其故故不敢嘗禮也物子曰古人解古文辭可謂盡之矣只其辭簡奧讀者未易解已故故實也謂禮也未知其故故不敢嘗是解孔子之言也禮者言孔子所以言者禮也醫師職曰醫師掌醫之政令聚毒藥以共醫事是古之藥多毒藥故鄭注曰藥之物恆多毒為則曰蓋鄭玄徂徠皆非醫也而不行而言藥多毒此誤也本草曰有毒無毒是食醫之事而非疾醫之事也以食醫混疾醫亦誤也是疾醫之道所以絕焉食醫者主養也疾醫者主攻也故古語攻病以毒藥養精以穀肉果菜雖穀肉果菜用為藥則有攻之意故藥皆毒也譬如甘麥大棗湯三味為食料則無毒用藥方中肯綮則大瞑眩或吐瀉或發汗而其毒解疾乃瘳是無它毒毒乎毒也吾黨小子行而言勿舌言雖彼博洽巨儒不行而言皆臆也故學如鄭玄徂徠尚致此過失矣聖人戒之曰有不知而作之者我無是也慎哉又曰如藥勿瞑眩厥疾勿瘳此非疾醫則不能解也知藥皆毒亦然物子曰饋毒於人而令死古者謂之饋藥焉是所以無饋藥之禮也孔子時禮失俗變貴人聞疾或饋之時人亦必嘗之依賜食之禮也皆非禮也此或一說家語曰哀公問孔子曰智者毒乎仁者壽乎孔子對曰然人有三死而非其命也己自取也夫寢處不時飲食不節逸勞過度者疾共殺之居下位而上於其君嗜欲無厭而求不止者刑共殺之以少犯眾以弱侮強忿怒不類動不量力兵共殺之此三者非命也人自取之若夫智士仁人將身有節動靜以義喜怒以時無害其性雖得壽焉不亦宜乎孔子曰良藥苦於口利於病為則曰藥皆毒也毒毒於毒而疾乃瘳奚藥之良之有焉按史記漢書皆作毒藥韓非子說苑並作良藥憶者劉向校閤家語之時因韓非作良藥乎今從史漢作毒藥為是曾子耘瓜誤斬其根曾皙怒建大杖以擊其背曾子仆地而不知人久之有頃乃蘇君子修道立德不為窮困而改節為之者人也生死者命也魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命形於一謂之性化於陰陽象形而發謂之生化窮數盡謂之死鄭子產有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛春秋左氏傳曰六日公至毒而獻之公祭之地墳與犬犬斃與小臣小臣亦斃為則曰地墳是不知為何毒太甚隕石於宋五隕星也六鷁退飛過宋風也云云退而告人曰君失問是陰陽之事非吉凶所生也吉凶由人吾不敢逆君故也為則曰陰陽者天事也吉凶者人事也積善餘慶而吉積惡餘殃而凶譬如人病有毒於內則因天令而毒動病無毒於內則天令雖烈不病也陰陽之事以人事不可計奉順而守之耳邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命齊侯戒師期而有疾醫曰不及秋將死穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒晉人獲素諜殺諸絳市六日而蘇晉胥克有蟲疾諺曰高下在心川澤納汙山藪藏疾郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沉溺重膇之疾不如新田土厚水深居之不疾為則曰是後世所謂腳氣之濫觴也然腳氣無毒人雖居卑濕之地不疾故特無腳氣之藥但視毒之所在而治則克治學者察諸晉侯夢大厲被髮及地搏膺而踴曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞戶公覺召桑田巫巫言如夢公曰何如曰不食新矣公疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如廁陷而卒小臣有晨夢負公以登及日中負晉侯出諸廁遂以為殉為則曰緩之言非疾醫之辭注曰傳言巫以明術見殺小臣以言夢自禍孔子曰不語怪力亂神豈亦其人之命耶晉範文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難苑氏福也六月戊辰士燮卒君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒為則曰非毒而病皆不可藥也子駟使賊夜弒僖公而以瘧疾赴於諸侯以待疆者而庇民焉寇不為害民不罷病不亦可乎子駟曰國病矣子展曰得罪於二大國必亡病不猶愈於亡乎為則曰疾病可治死不可救叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹吾見申叔夫子所謂生死而肉骨也其御曰孟孫之惡子也而哀如是季孫若死其若之何臧曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣詩曰誰能執熱逝不以濯禮之於政如熱之有濯也濯以救何患之有為則曰古昔有水漬之法亦如此太倉公傳可考矣然明謂子產曰毀鄉校如何子產曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子產不仁吾不信也晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子產曰云云由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之云云若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以德政晝以訪問夕以修令夜以安身於是乎節宜其氣勿使有所壅閉湫底以露其體茲心不爽而昏亂百度今無乃壹之則生疾矣僑又聞之內宦不及同姓其生不殖美先盡矣則相生疾君子是以惡之云云晉侯聞子產之言曰博物君子也重賄之為則曰子產曰若君身則亦出入飲食哀樂之事也嗚呼君子言哉慎疾醫之疾在飲食嗜欲守節爾後世謂風寒暑濕之疾誤可以知矣又曰子產曰君子有四時是養生修身之道可不務乎晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐云云趙孟曰良醫也厚其禮而歸之為則曰是國醫之論而非疾醫之事也後世醫書以此論言六氣之疾誤也蓋其所論近女室疾如蠱良臣將死皆是非疾為之也衛侯使賂周歂治瘽曰苟能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服將命周歂先入及門遇疾而死冶瘽辭卿為則曰周歂死也假令不死冶瘽見其疾以為罰而辭乃可矣過而改則無災也祭統曰爵有德而祿有功必賜爵祿於大廟爾不敢專也周冶為卿不義也不義神明不受也宜哉見罰晉侯飲酒云云亦自飲也曰味以行氣氣以實志志以定言言以出令臣實司味二御失官而君弗命臣之罪也公說徹酒為則曰味以行氣固然但後世醫家欲以毒藥行氣大誤矣何則非食味氣不得養故可謂味以行氣也藥皆毒疾亦毒也以毒攻毒氣或不行為有毒而去其毒則氣自行故不可謂藥以行氣也許悼公瘧五月戊辰飲太子止之藥卒太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也為則曰凡非本職勿好為焉奚唯藥泠州鳩曰王其以心疾死乎水潦方降疾瘧方起齊高強曰三折肱知為良醫為則曰醫之為功也以一不可決再三得功而後方證始可以言已樹德莫如滋去疾莫如盡是歲也有云如眾赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其天諸有罪受罰又焉移之遂弗禜昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方吳將代齊越子率其眾以朝焉王王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也且唯聖人能無外患又無內憂距非聖人必偏而後可偏而在外猶可救也疾自中起是難君子失心鮮不夭昏平公有疾秦景公使醫和視之云云文子曰醫及國家乎對曰上醫醫國其次疾人固醫官也為則曰國醫與疾醫之分於是可知吾聞國家將敗必用奸人而嗜其疾味其子之謂乎夫誰無疾眚能者蚤除之舊怨滅宗國之疾眚也管子曰朝忘其事夕失其功邪氣入內正色乃衰上恃龜好用巫醫則鬼神驟祟故功之不立名之不章為之患者三云云再會諸侯令曰養孤者食常疾收孤寡為則曰五霸之令如斯民之蒙恩澤可以知矣然至於孟子之時諸侯放肆乃不然故孟子曰今之諸侯五霸之罪人也故赦者犇馬之委轡毋赦者痤睢為則曰睢恐疽或癰字衍之礦石也滋味動靜生之養也好惡喜怒哀樂生之變也聰明當物生之德也是故聖人齊滋味而時動靜御正六氣之變也當生者生當死者死言有西有東各死其鄉置常立儀能守貞乎欲愛吾身先知吾情君親六合以考內身以此知象乃知行情既知行情乃知養生三月如咀咀者何曰五味五味何曰五臟酸主脾咸主肺辛主腎苦主肝甘主心五臟已具而後生肉脾生膈肺生骨腎生腦肝生革心生肉五肉已具而後發為九竅脾發為鼻肝發為目腎發為耳肺發為竅五月而成十月而生生而目視耳聽心慮目之所以視非特山陵之見也察於荒忽耳之所聽非特雷鼓聞也察於淑湫心之所慮非特知於粗粗也察於微眇為則曰五臟六腑四肢百骸之論諸書各異要之其旨皆以理推之論說之辭也蓋五臟六腑四肢百骸九竅皆造化之所為而非人之所為也醫家率以陰陽五行之理論之療之無有寸效矣疾醫不然以造化不混於人事萬病唯為一毒去其毒則目之不明也明耳之不聞也聞其為術可以知矣不能為而論之臆而無益君子不為遇者兼和然則天無疾風草木發奮鬱氣息民不疾而榮華蕃死死生生因天地之形天地之形聖人成之不思不慮不憂不圖利身體便形軀養壽命垂拱而天下治思索生知慢易生憂暴傲生怨憂鬱生疾疾困乃死思之而不捨內因外薄不蚤為圖生將巽舍為則曰憂鬱生疾是甚不然夫七情者氣也雖憂鬱逢喜有時忽消雖逢喜憂鬱或時不消是因憂而有毒聚而不去也疾者毒也無毒而不病故治術唯去毒耳學者思諸凡人之生也天出其精地出其形合此以為人和乃生不和不生察和之道其精不見其徵不醜平正擅胸論治在心此以長壽桓公曰善哉牧民何先管子對曰有時先事有時先政有時先德有時先怒飄風暴雨不為人害涸旱不為民患百川道年穀熱糴貨賤禽獸與人聚食民食民不疾病當春三月荻室熯造鑽燧易火抒抒引而泄之也又渫水也井易水所以去茲毒也夏有大露原煙噎下百草人採食之傷人人多疾病而不止云云大寒大暑大風大雨其至不時者此謂四刑或遇以死或遇以生君子避之是亦傷人為則曰天令不傷人以此足知或遇以死或遇以生是無它遇天令而內毒動而死者有之天令而內毒去而生者有之均是天令生死不同不可預知也故君子避之後世醫家計之論之妄哉噫起居時飲食節寒暑適則身利而壽命益起居不時飲食不節寒暑不適則形體累而壽命損修行慢易則汙辱生矣故曰邪氣襲內正色乃衰也人君唯母好全生則群臣皆全其生而生又養生養何也曰滋味也聲色也然後為養生然則從欲妄行男女無別反於禽獸然則禮義廉恥不立人君無以自守也故曰全生之說勝則廉恥不立民之能已民疾病者置之黃金一斤直食八石晏子春秋曰景公疥且瘧暮年不已召會譴梁丘據晏子而問焉曰寡人之疾病矣云云改月而君病悛為則曰此文與左傳同故不枚舉景公病水臥十數日夜夢與二日鬥不勝晏子朝公曰夕者夢與二日鬥而寡人不勝我其死乎晏子對曰請召占夢者出於閨使人以車迎占夢者至曰曷為見召晏子曰夜者公夢二日與公斗不勝公曰寡人死乎故請君占夢是何為也占夢者曰請反其書晏子曰毋反書公所病者陰也一陰不勝二陽故病將已以是對占夢者入云云居三日公病大愈景公病疽在背高子國子請公曰職當撫瘍高子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小如何曰如豆墮者何如曰如屨辨二子者出晏子請見公曰寡人有病不然勝衣冠以出見夫子其辱視寡人乎晏子入呼宰人具盥御者具巾刷手溫之發席傳薦跪請撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如珪晏子出公曰吾不見君子不知野人之拙也景公疥遂痁云云為則曰左傳之文大同小異故不枚舉
